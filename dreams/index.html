<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tristan Rio — Dreams</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #000;
      width: 100vw; height: 100vh;
      overflow: hidden;
      font-family: 'Georgia', serif;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
    }

    canvas#bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; }

    #ui {
      position: relative; z-index: 10;
      width: clamp(300px, 72vw, 820px);
      display: flex; flex-direction: column; align-items: center; gap: 2.2vh;
    }

    #question {
      color: rgba(255,255,255,0.7);
      font-size: clamp(15px, 2.2vw, 28px);
      letter-spacing: 0.18em;
      text-transform: uppercase;
      text-align: center;
      text-shadow: 0 0 20px rgba(180,100,255,0.7), 0 0 50px rgba(100,150,255,0.4);
      animation: questionPulse 4s ease-in-out infinite;
      pointer-events: none;
    }
    @keyframes questionPulse { 0%,100%{opacity:.7} 50%{opacity:1} }

    /* ── WRITE mode ── */
    #journal {
      width: 100%;
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 4px;
      color: rgba(255,255,255,0.88);
      font-family: 'Georgia', serif;
      font-size: clamp(14px, 1.8vw, 22px);
      line-height: 1.9;
      padding: 3vh 3vw;
      resize: none;
      outline: none;
      min-height: 36vh;
      caret-color: rgba(180,100,255,0.9);
      backdrop-filter: blur(4px);
      transition: border-color 0.3s, box-shadow 0.3s;
    }
    #journal:focus {
      border-color: rgba(180,100,255,0.4);
      box-shadow: 0 0 30px rgba(160,80,255,0.12), inset 0 0 20px rgba(100,60,200,0.05);
    }
    #journal::placeholder { color: rgba(255,255,255,0.2); font-style: italic; }

    /* ── PLAYBACK mode ── */
    #playback-view {
      display: none;
      width: 100%;
      min-height: 36vh;
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(180,100,255,0.2);
      border-radius: 4px;
      padding: 3vh 3vw;
      font-size: clamp(14px, 1.8vw, 22px);
      line-height: 1.9;
      color: rgba(255,255,255,0.3);
      overflow-y: auto;
      backdrop-filter: blur(4px);
      flex-wrap: wrap;
      word-break: break-word;
    }

    /* individual letter spans */
    .pl-letter {
      display: inline-block;
      transition: none;
      position: relative;
    }
    .pl-space { display: inline-block; width: 0.45em; }
    .pl-newline { display: block; height: 1.9em; }

    /* beat hit states */
    .pl-letter.hit {
      color: #fff;
      text-shadow:
        0 0 8px rgba(180,100,255,1),
        0 0 22px rgba(120,80,255,0.9),
        0 0 45px rgba(80,60,200,0.5);
      transform: scale(1.35) translateY(-3px);
      transition: transform 0.06s ease-out, color 0.06s, text-shadow 0.06s;
    }
    .pl-letter.decay {
      color: rgba(180,100,255,0.65);
      text-shadow: 0 0 10px rgba(180,100,255,0.4);
      transform: scale(1) translateY(0);
      transition: transform 0.45s ease-out, color 0.45s, text-shadow 0.45s;
    }

    /* word bar highlight — current bar glows */
    .pl-word { display: inline; }
    .pl-word.bar-active .pl-letter:not(.hit):not(.decay) {
      color: rgba(255,255,255,0.18);
    }

    /* controls row */
    #controls {
      display: flex; gap: 1.8vw; align-items: center; justify-content: center;
    }

    .ctrl-btn {
      background: none;
      border: 1px solid rgba(255,255,255,0.25);
      border-radius: 3px;
      color: rgba(255,255,255,0.6);
      font-family: 'Georgia', serif;
      font-size: clamp(10px, 1.1vw, 15px);
      letter-spacing: 0.22em;
      text-transform: uppercase;
      padding: 0.6em 1.4em;
      cursor: pointer;
      transition: border-color 0.3s, color 0.3s, box-shadow 0.3s;
    }
    .ctrl-btn:hover, .ctrl-btn.active {
      border-color: rgba(180,100,255,0.7);
      color: #fff;
      box-shadow: 0 0 16px rgba(160,80,255,0.25);
    }

    /* BPM indicator */
    #bpm-label {
      color: rgba(255,255,255,0.3);
      font-size: clamp(10px, 1vw, 13px);
      letter-spacing: 0.2em;
    }

    /* note particle */
    .note-particle {
      position: fixed; pointer-events: none; z-index: 50;
      font-size: clamp(11px, 1.4vw, 17px);
      animation: floatUp 1.3s ease-out forwards;
      user-select: none;
    }
    @keyframes floatUp {
      0%   { opacity: 1; transform: translateY(0) scale(1); }
      100% { opacity: 0; transform: translateY(-70px) scale(0.5); }
    }

    /* bar progress bar */
    #bar-progress {
      width: 100%; height: 2px;
      background: rgba(255,255,255,0.06);
      border-radius: 1px;
      overflow: hidden;
    }
    #bar-fill {
      height: 100%;
      background: linear-gradient(90deg, rgba(180,100,255,0.7), rgba(80,160,255,0.7));
      width: 0%;
      transition: none;
    }

    #back {
      color: rgba(255,255,255,0.35);
      font-size: clamp(10px, 1.1vw, 15px);
      letter-spacing: 0.3em; text-transform: uppercase;
      cursor: pointer; user-select: none;
      text-shadow: 0 0 12px rgba(180,100,255,0.4);
      transition: color 0.3s;
    }
    #back:hover { color: rgba(255,255,255,0.8); }

    /* ── Mood panel ── */
    #mood-panel {
      position: fixed;
      right: 2vw;
      top: 50%;
      transform: translateY(-50%);
      z-index: 20;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.7rem;
    }
    #mood-label {
      color: rgba(255,255,255,0.3);
      font-size: clamp(7px, 0.75vw, 10px);
      letter-spacing: 0.14em;
      text-transform: uppercase;
      text-align: center;
      line-height: 1.6;
      margin-bottom: 0.3rem;
    }
    .mood-btn {
      background: none;
      border: 1px solid rgba(255,255,255,0.18);
      border-radius: 3px;
      color: rgba(255,255,255,0.4);
      font-family: 'Georgia', serif;
      font-size: clamp(9px, 0.9vw, 12px);
      letter-spacing: 0.2em;
      text-transform: uppercase;
      padding: 0.5em 1em;
      cursor: pointer;
      transition: border-color 0.3s, color 0.3s, box-shadow 0.3s;
      min-width: 64px;
    }
    .mood-btn:hover {
      border-color: rgba(180,100,255,0.6);
      color: rgba(255,255,255,0.85);
      box-shadow: 0 0 10px rgba(160,80,255,0.2);
    }
    .mood-btn.active {
      border-color: rgba(180,100,255,0.85);
      color: #fff;
      box-shadow: 0 0 16px rgba(160,80,255,0.35);
      text-shadow: 0 0 10px rgba(180,100,255,0.6);
    }
  </style>
</head>
<body>
<canvas id="bg"></canvas>

<div id="ui">
  <div id="question">Who are you? &nbsp;·&nbsp; Where do we go?</div>

  <textarea id="journal" placeholder="Write here… every letter sings."></textarea>
  <div id="playback-view"></div>

  <div id="bar-progress"><div id="bar-fill"></div></div>

  <div id="controls">
    <button class="ctrl-btn" id="btn-play">&#9654; Play</button>
    <button class="ctrl-btn" id="btn-stop" style="display:none">&#9632; Stop</button>
    <span id="bpm-label">90 BPM · 1 word = 1 beat</span>
  </div>

  <div id="back" onclick="window.location.href='../'">&#8592; Return</div>
</div>

<div id="mood-panel">
  <div id="mood-label">How do<br>you feel<br>today?</div>
  <button class="mood-btn active" data-mode="up">Up</button>
  <button class="mood-btn" data-mode="down">Down</button>
  <button class="mood-btn" data-mode="in">In</button>
  <button class="mood-btn" data-mode="out">Out</button>
</div>

<script>
/* ═══ BACKGROUND ═══ */
const bgCanvas = document.getElementById('bg');
const bgCtx = bgCanvas.getContext('2d');
let W, H;
function resize() { W = bgCanvas.width = window.innerWidth; H = bgCanvas.height = window.innerHeight; }
resize();
window.addEventListener('resize', resize);

const bgStars = Array.from({length: 300}, () => ({
  x: Math.random(), y: Math.random(),
  r: Math.random() * 1.0 + 0.2,
  phase: Math.random() * Math.PI * 2,
  speed: 0.006 + Math.random() * 0.012,
  color: Math.random() < 0.06 ? 'rgba(180,100,255,0.8)' : '#ffffff',
}));
const wisps = Array.from({length: 5}, () => ({
  x: Math.random(), y: Math.random(),
  rx: 0.1 + Math.random() * 0.18, ry: 0.06 + Math.random() * 0.1,
  rot: Math.random() * Math.PI,
  c: `rgba(${ ['120,40,200','80,40,180','160,60,220','40,80,200','100,20,180'][Math.floor(Math.random()*5)] },0.07)`,
  phase: Math.random() * Math.PI * 2,
}));

function drawBg() {
  bgCtx.fillStyle = '#000'; bgCtx.fillRect(0, 0, W, H);
  for (const w of wisps) {
    w.phase += 0.002;
    bgCtx.save();
    bgCtx.translate(w.x*W, w.y*H); bgCtx.rotate(w.rot + w.phase*0.1); bgCtx.scale(1, w.ry/w.rx);
    const g = bgCtx.createRadialGradient(0,0,0,0,0,w.rx*W);
    g.addColorStop(0, w.c); g.addColorStop(1,'transparent');
    bgCtx.beginPath(); bgCtx.arc(0,0,w.rx*W,0,Math.PI*2);
    bgCtx.fillStyle = g; bgCtx.fill(); bgCtx.restore();
  }
  for (const s of bgStars) {
    s.phase += s.speed;
    bgCtx.globalAlpha = 0.2 + 0.7 * Math.abs(Math.sin(s.phase));
    bgCtx.fillStyle = s.color;
    bgCtx.beginPath(); bgCtx.arc(s.x*W, s.y*H, s.r, 0, Math.PI*2); bgCtx.fill();
  }
  bgCtx.globalAlpha = 1;
  requestAnimationFrame(drawBg);
}
drawBg();

/* ═══ MODES ═══ */
const MODES = {
  up:   { intervals: [0,2,4,6,7,9,11], rootHz: 82.41, bpm: 65  }, // E Lydian
  down: { intervals: [0,2,3,5,7,8,10], rootHz: 73.42, bpm: 60  }, // D natural minor
  in:   { intervals: [0,2,3,5,7,9,10], rootHz: 58.27, bpm: 65  }, // Bb Dorian
  out:  { intervals: [0,2,4,5,7,9,11], rootHz: 98.00, bpm: 120 }, // G major
};
let currentMode = MODES.up;

function scaleHz(degree) {
  const m = currentMode;
  const oct = Math.floor(degree / 7);
  const step = degree % 7;
  return m.rootHz * Math.pow(2, oct) * Math.pow(2, m.intervals[step] / 12);
}

function charToDegree(ch) {
  const c = ch.toLowerCase().charCodeAt(0);
  if (c < 97 || c > 122) return 0;
  return Math.round((c - 97) / 25 * 13);
}

let ac = null, masterGain, masterComp, masterClip, revNode, revWet;

function buildIR(sec) {
  const sr = ac.sampleRate;
  const buf = ac.createBuffer(2, Math.floor(sr * sec), sr);
  for (let ch = 0; ch < 2; ch++) {
    const d = buf.getChannelData(ch);
    let lp = 0;
    for (let i = 0; i < d.length; i++) {
      const t = i / d.length;
      const n = Math.random()*2-1;
      lp = lp*0.82 + n*0.18;
      d[i] = lp * Math.pow(1-t, 2.2);
    }
  }
  return buf;
}

function initAudio() {
  if (ac) return;
  ac = new (window.AudioContext || window.webkitAudioContext)();
  masterComp = ac.createDynamicsCompressor();
  masterComp.threshold.value = -6; masterComp.ratio.value = 12;
  masterComp.attack.value = 0.003; masterComp.release.value = 0.15;
  masterClip = ac.createWaveShaper();
  const cc = new Float32Array(65536);
  for (let i = 0; i < 65536; i++) { const x=(i/65536)*2-1; cc[i]=Math.max(-0.95,Math.min(0.95,x)); }
  masterClip.curve = cc;
  masterGain = ac.createGain(); masterGain.gain.value = 0.48;
  masterGain.connect(masterComp); masterComp.connect(masterClip); masterClip.connect(ac.destination);
  revNode = ac.createConvolver(); revNode.buffer = buildIR(3.0);
  revWet = ac.createGain(); revWet.gain.value = 0.5;
  revNode.connect(revWet); revWet.connect(masterGain);
}

/* ═══ DRUM SYNTHESIS ═══ */
function scheduleKick(startT) {
  const env = ac.createGain();
  env.gain.setValueAtTime(0.28, startT);
  env.gain.exponentialRampToValueAtTime(0.0001, startT + 0.9);
  const osc = ac.createOscillator();
  osc.frequency.setValueAtTime(80, startT);
  osc.frequency.exponentialRampToValueAtTime(42, startT + 0.25);
  osc.connect(env); env.connect(masterGain);
  osc.start(startT); osc.stop(startT + 1.0);
}

function scheduleHihat(startT) {
  const bufSz = Math.floor(ac.sampleRate * 0.08);
  const buf = ac.createBuffer(1, bufSz, ac.sampleRate);
  const d = buf.getChannelData(0);
  for (let i = 0; i < bufSz; i++) d[i] = Math.random() * 2 - 1;
  const src = ac.createBufferSource(); src.buffer = buf;
  const hp = ac.createBiquadFilter(); hp.type = 'highpass'; hp.frequency.value = 9000;
  const env = ac.createGain();
  env.gain.setValueAtTime(0.22, startT);
  env.gain.exponentialRampToValueAtTime(0.0001, startT + 0.07);
  src.connect(hp); hp.connect(env); env.connect(masterGain);
  src.start(startT); src.stop(startT + 0.09);
}

function scheduleSnare(startT) {
  // Noise body
  const bufSz = Math.floor(ac.sampleRate * 0.18);
  const buf = ac.createBuffer(1, bufSz, ac.sampleRate);
  const d = buf.getChannelData(0);
  for (let i = 0; i < bufSz; i++) d[i] = Math.random() * 2 - 1;
  const src = ac.createBufferSource(); src.buffer = buf;
  const bp = ac.createBiquadFilter(); bp.type = 'bandpass'; bp.frequency.value = 2200; bp.Q.value = 0.7;
  const nEnv = ac.createGain();
  nEnv.gain.setValueAtTime(0.38, startT);
  nEnv.gain.exponentialRampToValueAtTime(0.0001, startT + 0.16);
  src.connect(bp); bp.connect(nEnv); nEnv.connect(masterGain);
  src.start(startT); src.stop(startT + 0.18);
  // Tone crack
  const osc = ac.createOscillator(); osc.frequency.value = 200;
  const oEnv = ac.createGain();
  oEnv.gain.setValueAtTime(0.28, startT);
  oEnv.gain.exponentialRampToValueAtTime(0.0001, startT + 0.07);
  osc.connect(oEnv); oEnv.connect(masterGain);
  osc.start(startT); osc.stop(startT + 0.09);
}

/* Schedule a note at a precise AudioContext time */
function scheduleNote(hz, startT, durS, vol = 0.18) {
  const env = ac.createGain();
  const atkT = Math.min(0.05, durS * 0.2);
  const relT = Math.min(0.5, durS * 0.7);
  env.gain.setValueAtTime(0, startT);
  env.gain.linearRampToValueAtTime(vol, startT + atkT);
  env.gain.exponentialRampToValueAtTime(0.0001, startT + atkT + relT);
  env.connect(masterGain); env.connect(revNode);

  const detunes = [-4, 0, 5];
  for (const d of detunes) {
    const osc = ac.createOscillator();
    osc.type = 'sine';
    osc.frequency.value = hz;
    osc.detune.value = d;
    const g = ac.createGain(); g.gain.value = d===0 ? 0.6 : 0.2;
    osc.connect(g); g.connect(env);
    osc.start(startT); osc.stop(startT + atkT + relT + 0.05);
  }
}

/* ═══ LIVE TYPING ═══ */
const journal = document.getElementById('journal');
const NOTE_SYMS = ['♩','♪','♫','♬'];

journal.addEventListener('keydown', e => {
  if (e.key.length !== 1 && e.key !== 'Enter') return;
  initAudio(); if (ac.state==='suspended') ac.resume();
  const pos = journal.selectionStart;
  const text = journal.value;
  const lineStart = text.lastIndexOf('\n', pos-1)+1;
  const col = pos - lineStart;
  const line = text.substring(0, pos).split('\n').length;
  const degree = col % 14;
  const octShift = Math.min(line-1, 2);
  const hz = scaleHz(degree) * Math.pow(2, octShift);
  scheduleNote(hz, ac.currentTime, 1.2);
  spawnParticle(null);
});

function spawnParticle(el) {
  const ref = el || journal;
  const rect = ref.getBoundingClientRect();
  const div = document.createElement('div');
  div.className = 'note-particle';
  div.textContent = NOTE_SYMS[Math.floor(Math.random()*NOTE_SYMS.length)];
  div.style.left = (rect.left + Math.random()*rect.width) + 'px';
  div.style.top  = (rect.top  + Math.random()*rect.height*0.8) + 'px';
  div.style.color = `hsl(${240+Math.random()*80},80%,75%)`;
  document.body.appendChild(div);
  setTimeout(() => div.remove(), 1400);
}

/* ═══ PLAYBACK ENGINE ═══ */

const playView = document.getElementById('playback-view');
const barFill  = document.getElementById('bar-fill');
const btnPlay  = document.getElementById('btn-play');
const btnStop  = document.getElementById('btn-stop');

let playTimers = [];
let rafId = null;
let playStartAC = null;
let playStartWall = null;
let totalBars = 0;
let playing = false;

/* Build the playback DOM — spans per letter, grouped by word */
function buildPlayDOM(text) {
  playView.innerHTML = '';
  // Tokenise into words, spaces, newlines
  const tokens = [];
  let buf = '';
  for (const ch of text) {
    if (ch === ' ' || ch === '\n') {
      if (buf) { tokens.push({type:'word', text:buf}); buf=''; }
      tokens.push({type: ch==='\n' ? 'newline' : 'space'});
    } else {
      buf += ch;
    }
  }
  if (buf) tokens.push({type:'word', text:buf});

  const allLetterSpans = []; // flat list of {span, wordIdx, letterIdx}
  const wordWrappers = [];   // per-word wrapper divs

  let wordIdx = 0;
  for (const tok of tokens) {
    if (tok.type === 'space') {
      const sp = document.createElement('span');
      sp.className = 'pl-space';
      playView.appendChild(sp);
    } else if (tok.type === 'newline') {
      const br = document.createElement('div');
      br.className = 'pl-newline';
      playView.appendChild(br);
    } else {
      const wrap = document.createElement('span');
      wrap.className = 'pl-word';
      wrap.dataset.wordIdx = wordIdx;
      wordWrappers.push(wrap);
      for (let li = 0; li < tok.text.length; li++) {
        const sp = document.createElement('span');
        sp.className = 'pl-letter';
        sp.textContent = tok.text[li];
        wrap.appendChild(sp);
        allLetterSpans.push({ span: sp, wordIdx, letterIdx: li, char: tok.text[li] });
      }
      playView.appendChild(wrap);
      wordIdx++;
    }
  }
  return { allLetterSpans, wordWrappers, wordCount: wordIdx };
}

function startPlayback() {
  const text = journal.value.trim();
  if (!text) return;
  initAudio(); if (ac.state==='suspended') ac.resume();

  playing = true;
  journal.style.display = 'none';
  playView.style.display = 'block';
  btnPlay.style.display = 'none';
  btnStop.style.display = '';
  btnStop.classList.add('active');
  barFill.style.width = '0%';

  const { allLetterSpans, wordWrappers, wordCount } = buildPlayDOM(text);
  totalBars = wordCount;
  playStartAC   = ac.currentTime + 0.1;
  playStartWall = performance.now() + 100;
  const barSec = 60 / currentMode.bpm;

  // ── Schedule 4-on-the-floor drums ──
  for (let beat = 0; beat < totalBars; beat++) {
    const beatT = playStartAC + beat * barSec;
    scheduleKick(beatT);
    scheduleHihat(beatT);
    scheduleHihat(beatT + barSec * 0.5);
    if (beat % 2 === 1) scheduleSnare(beatT);
  }

  // ── Schedule audio & visual timers per letter ──
  for (let wi = 0; wi < wordCount; wi++) {
    const barStart = wi * barSec;
    const letters = allLetterSpans.filter(l => l.wordIdx === wi);
    const n = letters.length;
    const noteInterval = barSec / n;

    // Highlight current bar wrapper
    const barT = barStart * 1000;
    const barEndT = (barStart + barSec) * 1000;
    playTimers.push(setTimeout(() => {
      wordWrappers.forEach(w => w.classList.remove('bar-active'));
      if (wordWrappers[wi]) wordWrappers[wi].classList.add('bar-active');
    }, barT));

    for (let li = 0; li < n; li++) {
      const { span, char } = letters[li];
      const noteOffset = barStart + li * noteInterval;
      const acT = playStartAC + noteOffset;
      const wallDelay = noteOffset * 1000;

      const degree = charToDegree(char);
      const octShift = Math.floor(li / 7) % 3;
      const hz = scaleHz(degree) * Math.pow(2, octShift);
      const vol = 0.12 + (degree / 13) * 0.1;

      // Audio — precisely scheduled
      scheduleNote(hz, acT, noteInterval * 0.85, vol);

      // Visual — setTimeout aligned to wall clock
      const tid = setTimeout(() => {
        span.classList.remove('decay');
        span.classList.add('hit');
        spawnParticle(span);
        setTimeout(() => {
          span.classList.remove('hit');
          span.classList.add('decay');
        }, 120);
      }, wallDelay);
      playTimers.push(tid);
    }
  }

  // ── Progress bar animation via rAF ──
  const totalDur = totalBars * barSec * 1000;
  function animBar() {
    if (!playing) return;
    const elapsed = performance.now() - playStartWall;
    const pct = Math.min(elapsed / totalDur * 100, 100);
    barFill.style.width = pct + '%';
    if (pct < 100) { rafId = requestAnimationFrame(animBar); }
    else { setTimeout(stopPlayback, 800); }
  }
  rafId = requestAnimationFrame(animBar);
}

function stopPlayback() {
  playing = false;
  playTimers.forEach(clearTimeout); playTimers = [];
  if (rafId) { cancelAnimationFrame(rafId); rafId = null; }
  document.querySelectorAll('.pl-word').forEach(w => w.classList.remove('bar-active'));
  barFill.style.width = '0%';
  playView.style.display = 'none';
  journal.style.display = '';
  btnStop.style.display = 'none';
  btnStop.classList.remove('active');
  btnPlay.style.display = '';
  journal.focus();
}

      smoothPitch += (targetPitch - smoothPitch) * 0.06;

      cc.moveTo(p.x, p.y);
      cc.lineTo(p.x - (p.vx/len) * len * 2.5, p.y - (p.vy/len) * len * 2.5);

      cc.lineWidth = p.size * 0.55; cc.stroke();

      cc.globalAlpha = 1;
      p.x += p.vx; p.y += p.vy;
      p.vx *= 0.92; p.vy *= 0.92;
      p.life -= p.decay;
      if (p.life <= 0) WARP.splice(i, 1);

    cc.globalAlpha = 1;

        cc.lineWidth = r.lw * 0.55; cc.stroke();
      }
      r.r += r.expand; r.alpha *= 0.905;
      if (r.r > r.maxR || r.alpha < 0.01) RIPPLES.splice(i, 1);
    }

    drawShip(mx, my, smoothAngle, smoothPitch, bob);
    requestAnimationFrame(drawFrame);
  }
  drawFrame();
})();

    cc.beginPath(); cc.moveTo(18, -12); cc.lineTo(18, -42); cc.stroke();
    // Mainmast
    cc.lineWidth = 2.6;
    cc.beginPath(); cc.moveTo(-2, -12); cc.lineTo(-2, -64); cc.stroke();
    // Mizzenmast (stern castle)
    cc.lineWidth = 1.6;
    cc.beginPath(); cc.moveTo(-24, -15); cc.lineTo(-24, -37); cc.stroke();

    // ── RIGGING (stays) ──
    cc.strokeStyle = 'rgba(74,44,16,0.5)'; cc.lineWidth = 0.6;
    cc.beginPath(); cc.moveTo(18, -16); cc.lineTo(54, -27); cc.stroke();
    cc.beginPath(); cc.moveTo(18, -22); cc.lineTo(54, -27); cc.stroke();
    cc.beginPath(); cc.moveTo(18, -40); cc.lineTo(-2, -62); cc.stroke();
    cc.beginPath(); cc.moveTo(18, -28); cc.lineTo(-2, -44); cc.stroke();
    cc.beginPath(); cc.moveTo(-2, -44); cc.lineTo(-24, -35); cc.stroke();
    cc.beginPath(); cc.moveTo(-2, -62); cc.lineTo(-24, -35); cc.stroke();

    const billow = Math.sin(frame * 0.018) * 6;
    const tatter = Math.sin(frame * 0.031) * 1.8;

    // ── MAIN SAIL (two panels, tattered tops) ──
    // Left panel (windward)
    cc.beginPath();
    cc.moveTo(-2, -14); cc.lineTo(-22, -14);
    cc.quadraticCurveTo(-28 + billow, -37, -22, -58);
    cc.lineTo(-18, -57 + tatter); cc.lineTo(-13, -59);
    cc.lineTo(-8,  -57 + tatter*0.6); cc.lineTo(-4, -59); cc.lineTo(-2, -58);
    cc.closePath();
    cc.fillStyle = 'rgba(195,170,95,0.82)'; cc.fill();
    cc.strokeStyle = 'rgba(70,50,14,0.5)'; cc.lineWidth = 0.5; cc.stroke();
    // Right panel (leeward)
    cc.beginPath();
    cc.moveTo(-2, -14); cc.lineTo(18, -14);
    cc.quadraticCurveTo(24 - billow, -37, 18, -58);
    cc.lineTo(14, -57 + tatter); cc.lineTo(9, -59);
    cc.lineTo(4,  -57 + tatter*0.6); cc.lineTo(0, -59); cc.lineTo(-2, -58);
    cc.closePath();
    cc.fillStyle = 'rgba(178,154,82,0.80)'; cc.fill();
    cc.strokeStyle = 'rgba(70,50,14,0.5)'; cc.lineWidth = 0.5; cc.stroke();
    // Yards
    cc.strokeStyle = '#4a2c10'; cc.lineWidth = 1.5;
    cc.beginPath(); cc.moveTo(-22, -14); cc.lineTo(18, -14); cc.stroke();
    cc.beginPath(); cc.moveTo(-22, -58); cc.lineTo(18, -58); cc.stroke();
    cc.lineWidth = 1.1;
    cc.beginPath(); cc.moveTo(-14, -36); cc.lineTo(10, -36); cc.stroke();

    // ── TOPSAIL ──
    cc.beginPath();
    cc.moveTo(-2, -58); cc.lineTo(-12, -58);
    cc.quadraticCurveTo(-16 + billow*0.5, -65, -11, -72);
    cc.lineTo(-2, -72); cc.closePath();
    cc.fillStyle = 'rgba(185,162,88,0.70)'; cc.fill();
    cc.beginPath();
    cc.moveTo(-2, -58); cc.lineTo(9, -58);
    cc.quadraticCurveTo(12 - billow*0.5, -65, 8, -72);
    cc.lineTo(-2, -72); cc.closePath();
    cc.fillStyle = 'rgba(170,148,76,0.68)'; cc.fill();
    cc.strokeStyle = '#4a2c10'; cc.lineWidth = 1.0;
    cc.beginPath(); cc.moveTo(-12, -58); cc.lineTo(9, -58); cc.stroke();
    cc.beginPath(); cc.moveTo(-11, -72); cc.lineTo(8, -72); cc.stroke();

    // ── FORE SAIL ──
    cc.beginPath();
    cc.moveTo(18, -13); cc.lineTo(5, -13);
    cc.quadraticCurveTo(1 + billow*0.7, -26, 6, -40);
    cc.lineTo(18, -40); cc.closePath();
    cc.fillStyle = 'rgba(192,168,90,0.76)'; cc.fill();
    cc.strokeStyle = 'rgba(70,50,14,0.4)'; cc.lineWidth = 0.5; cc.stroke();
    cc.strokeStyle = '#4a2c10'; cc.lineWidth = 1.1;
    cc.beginPath(); cc.moveTo(5, -13); cc.lineTo(18, -13); cc.stroke();
    cc.beginPath(); cc.moveTo(6, -40); cc.lineTo(18, -40); cc.stroke();

    // ── JIB ──
    cc.beginPath();
    cc.moveTo(32, -10); cc.lineTo(54, -27); cc.lineTo(18, -40); cc.closePath();
    cc.fillStyle = 'rgba(215,192,118,0.62)'; cc.fill();
    cc.strokeStyle = 'rgba(70,50,14,0.4)'; cc.lineWidth = 0.5; cc.stroke();

    // ── MIZZEN SAIL ──
    cc.beginPath();
    cc.moveTo(-24, -16); cc.lineTo(-34, -16);
    cc.quadraticCurveTo(-38 + billow*0.35, -26, -34, -36);
    cc.lineTo(-24, -36); cc.closePath();
    cc.fillStyle = 'rgba(185,162,85,0.72)'; cc.fill();
    cc.strokeStyle = '#4a2c10'; cc.lineWidth = 1.0;
    cc.beginPath(); cc.moveTo(-34, -16); cc.lineTo(-24, -16); cc.stroke();
    cc.beginPath(); cc.moveTo(-34, -36); cc.lineTo(-24, -36); cc.stroke();

    // ── CROW'S NEST (mainmast) ──
    cc.fillStyle = '#1e1008';
    cc.beginPath(); cc.rect(-7, -54, 11, 5); cc.fill();
    cc.strokeStyle = '#4a2c10'; cc.lineWidth = 0.8; cc.stroke();
    // Foremast crow's nest
    cc.beginPath(); cc.rect(14, -37, 9, 4); cc.fill(); cc.stroke();

    // ── JOLLY ROGER ──
    const fw = Math.sin(frame * 0.085) * 4;
    cc.beginPath();
    cc.moveTo(-2, -76);
    cc.lineTo(-2 + 14 + fw, -76);
    cc.lineTo(-2 + 12 + fw*0.6, -70);
    cc.lineTo(-2, -70);
    cc.closePath();
    cc.fillStyle = '#0a0a0a'; cc.fill();
    cc.font = '6px sans-serif'; cc.textAlign = 'center'; cc.textBaseline = 'middle';
    cc.fillStyle = 'rgba(255,255,255,0.88)';
    cc.fillText('☠', -2 + 7 + fw*0.5, -73);

    // ── STERN LANTERN ──
    const lp = 0.5 + 0.5 * Math.sin(frame * 0.07);
    cc.shadowColor = `rgba(255,190,60,${0.5 + lp*0.4})`;
    cc.shadowBlur = 5 + lp * 5;
    cc.beginPath(); cc.arc(-30, -18, 2.8, 0, Math.PI*2);
    cc.fillStyle = `rgba(255,210,90,${0.55 + lp*0.35})`; cc.fill();
    cc.shadowBlur = 0;

    // ── WARP NOZZLE ──
    cc.beginPath();
    cc.moveTo(-24, -5); cc.lineTo(-32, -3); cc.lineTo(-32, 7); cc.lineTo(-24, 9);
    cc.closePath();
    cc.fillStyle = '#111'; cc.fill();
    cc.strokeStyle = '#00aaff'; cc.lineWidth = 0.9; cc.stroke();
    const fl = 180 + Math.floor(Math.sin(frame * 0.15) * 55);
    cc.beginPath();
    cc.moveTo(-24, -2); cc.lineTo(-31, 2); cc.lineTo(-24, 8); cc.closePath();
    cc.fillStyle = `rgba(0,${fl},255,0.95)`; cc.fill();

    cc.restore();
  }

  function drawFrame() {
    const inEditMode = document.body.classList.contains('edit-mode');
    cc_canvas.style.display = inEditMode ? 'none' : 'block';
    if (inEditMode) { requestAnimationFrame(drawFrame); return; }
    cc.clearRect(0, 0, cc_canvas.width, cc_canvas.height);
    frame++;

    let diff = shipAngle - smoothAngle;
    while (diff > Math.PI) diff -= Math.PI*2;
    while (diff < -Math.PI) diff += Math.PI*2;
    smoothAngle += diff * 0.035;

    // Pitch: vertical tilt based on dy — smoothed slowly for heavy ship feel
    if (speed > 0.5) {
      const targetPitch = (lastDy / Math.max(speed, 1)) * 1.4;
      smoothPitch += (targetPitch - smoothPitch) * 0.06;
    }

    const bob = Math.sin(frame * 0.038) * 1.8;

    for (let i = WARP.length - 1; i >= 0; i--) {
      const p = WARP[i];
      const len = Math.sqrt(p.vx*p.vx + p.vy*p.vy + 0.001);
      cc.beginPath();
      cc.moveTo(p.x, p.y);
      cc.lineTo(p.x - (p.vx/len) * len * 2.5, p.y - (p.vy/len) * len * 2.5);
      cc.strokeStyle = p.color; cc.globalAlpha = p.life * 0.55;
      cc.lineWidth = p.size * 0.55; cc.stroke();
      cc.beginPath(); cc.arc(p.x, p.y, p.size * p.life * 0.8, 0, Math.PI*2);
      cc.fillStyle = p.color; cc.globalAlpha = p.life * 0.85; cc.fill();
      cc.globalAlpha = 1;
      p.x += p.vx; p.y += p.vy;
      p.vx *= 0.92; p.vy *= 0.92;
      p.life -= p.decay;
      if (p.life <= 0) WARP.splice(i, 1);
    }
    cc.globalAlpha = 1;

    for (let i = RIPPLES.length - 1; i >= 0; i--) {
      const r = RIPPLES[i];
      cc.beginPath(); cc.arc(r.x, r.y, r.r, 0, Math.PI*2);
      cc.strokeStyle = `rgba(0,220,255,${r.alpha})`;
      cc.lineWidth = r.lw; cc.stroke();
      if (r.r > 18) {
        cc.beginPath(); cc.arc(r.x, r.y, r.r * 0.52, 0, Math.PI*2);
        cc.strokeStyle = `rgba(140,70,255,${r.alpha * 0.45})`;
        cc.lineWidth = r.lw * 0.55; cc.stroke();
      }
      r.r += r.expand; r.alpha *= 0.905;
      if (r.r > r.maxR || r.alpha < 0.01) RIPPLES.splice(i, 1);
    }

    drawShip(mx, my, smoothAngle, smoothPitch, bob);
    requestAnimationFrame(drawFrame);
  }
  drawFrame();
})();
</script>
<script src="../miniplayer.js"></script>
