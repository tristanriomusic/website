<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Tristan Rio — Space</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; cursor: none !important; }
    body.edit-mode * { cursor: default !important; }
    body.edit-mode .zone-handle { cursor: grab !important; }
    body.edit-mode .zone-handle:active { cursor: grabbing !important; }
    body.edit-mode .zone-size-handle { cursor: crosshair !important; }
    body { background: #000; width: 100vw; height: 100vh; overflow: hidden; font-family: 'Georgia', serif; }
    canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; touch-action: none; }
    #main { z-index: 1; }

    #tip {
      position: fixed; z-index: 20; pointer-events: none;
      background: rgba(0,0,0,0.75); padding: 7px 16px; border-radius: 2px;
      opacity: 0; transition: opacity 0.25s;
      max-width: 38vw;
    }
    #tip-name {
      display: block;
      color: #fff; font-size: clamp(11px, 1.4vw, 18px);
      letter-spacing: 0.28em; text-transform: uppercase;
      margin-bottom: 3px;
    }
    #tip-desc {
      display: block;
      color: rgba(255,255,255,0.5); font-size: clamp(9px, 1vw, 13px);
      letter-spacing: 0.12em; font-style: italic;
    }

    #back {
      position: fixed; bottom: 3vh; left: 50%; transform: translateX(-50%);
      z-index: 20; color: rgba(255,255,255,0.4);
      font-size: clamp(10px, 1.2vw, 16px); letter-spacing: 0.28em; text-transform: uppercase;
      cursor: pointer; user-select: none;
      text-shadow: 0 0 12px rgba(0,200,255,0.4); transition: color 0.3s;
    }
    #back:hover { color: #fff; }

    /* ── Mobile panel dots ── */
    #panel-dots {
      display: none;
      position: fixed; bottom: 14px; left: 50%; transform: translateX(-50%);
      z-index: 30; gap: 10px; align-items: center;
    }
    @media (max-width: 768px) { #panel-dots { display: flex; } }
    .panel-dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: rgba(255,255,255,0.3);
      transition: background 0.25s;
      cursor: pointer;
    }
    .panel-dot.active { background: rgba(0,220,255,0.9); }

    /* ── Edit mode ── */
    #edit-bar {
      display: none;
      position: fixed; bottom: 0; left: 0; right: 0; z-index: 80;
      background: rgba(0,0,0,0.85);
      padding: 8px 16px;
      color: #fff; font-size: 12px; letter-spacing: 0.15em;
      font-family: monospace;
    }
    #edit-bar.visible { display: flex; align-items: center; gap: 16px; flex-wrap: wrap; }
    #edit-coords { flex: 1; color: rgba(0,255,200,0.8); font-size: 11px; white-space: pre-wrap; word-break: break-all; }
    #edit-hint { color: rgba(255,255,255,0.45); flex-shrink:0; }

    .zone-handle {
      position: fixed; z-index: 75;
      width: 14px; height: 14px;
      border-radius: 50%;
      border: 2px solid #fff;
      transform: translate(-50%, -50%);
      cursor: grab;
      pointer-events: auto;
      box-shadow: 0 0 8px currentColor;
    }
    .zone-handle:active { cursor: grabbing; }
    .zone-handle-label {
      position: absolute; top: 16px; left: 50%;
      transform: translateX(-50%);
      white-space: nowrap;
      font-size: 9px; letter-spacing: 0.1em; text-transform: uppercase;
      color: #fff; background: rgba(0,0,0,0.7);
      padding: 1px 5px; border-radius: 2px;
      pointer-events: none;
    }
    /* Size/shape handles — square, smaller */
    .zone-size-handle {
      position: fixed; z-index: 75;
      width: 8px; height: 8px;
      border: 2px solid #fff;
      transform: translate(-50%, -50%);
      cursor: crosshair;
      pointer-events: auto;
      box-shadow: 0 0 6px currentColor;
    }
    .zone-size-handle:active { cursor: grabbing; }
    #handle-layer { display: none; position: fixed; inset: 0; z-index: 74; pointer-events: none; }
    #handle-layer.visible { display: block; pointer-events: none; }

    /* ── Modal overlay ── */
    #modal {
      display: none;
      position: fixed; inset: 0; z-index: 60;
      background: transparent;
      align-items: center; justify-content: center; flex-direction: column;
      gap: 24px;
    }
    #modal.visible { display: flex; animation: fadeM 0.5s ease; }
    @keyframes fadeM { from{opacity:0} to{opacity:1} }

    #modal-frame {
      width: min(85vw, 900px);
      height: min(75vh, 560px);
      border: 1px solid rgba(255,255,255,0.18);
      box-shadow: 0 0 0 1px rgba(0,0,0,0.5), 0 0 80px rgba(0,180,255,0.25), 0 8px 60px rgba(0,0,0,0.7);
      border-radius: 4px;
    }

    #modal-placeholder {
      color: rgba(255,255,255,0.75);
      font-size: clamp(16px, 2.5vw, 36px);
      letter-spacing: 0.22em; text-align: center;
      text-shadow: 0 0 40px rgba(180,100,255,0.8);
      animation: placePulse 3s ease-in-out infinite;
      padding: 0 10vw;
      line-height: 1.6;
    }
    @keyframes placePulse { 0%,100%{opacity:.65} 50%{opacity:1} }

    #modal-close {
      color: rgba(255,255,255,0.35); font-size: clamp(10px, 1.2vw, 16px);
      letter-spacing: 0.32em; text-transform: uppercase;
      cursor: pointer; user-select: none; transition: color 0.3s;
    }
    #modal-close:hover { color: #fff; }

    /* ── Truth overlay ── */
    #truth-overlay {
      display: none;
      position: fixed; inset: 0; z-index: 60;
      align-items: center; justify-content: center;
      background: rgba(0,0,0,0.55);
      backdrop-filter: blur(2px);
    }
    #truth-overlay.visible { display: flex; animation: fadeM 0.5s ease; }
    #truth-ui {
      width: clamp(300px, 72vw, 820px);
      display: flex; flex-direction: column; align-items: center; gap: 2vh;
    }
    #truth-question {
      color: rgba(255,255,255,0.7);
      font-size: clamp(15px, 2.2vw, 28px);
      letter-spacing: 0.18em; text-transform: uppercase;
      text-align: center;
      text-shadow: 0 0 20px rgba(180,100,255,0.7), 0 0 50px rgba(100,150,255,0.4);
      animation: questionPulse 4s ease-in-out infinite;
    }
    @keyframes questionPulse { 0%,100%{opacity:.7} 50%{opacity:1} }
    #truth-journal {
      width: 100%;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 4px;
      color: rgba(255,255,255,0.88);
      font-family: 'Georgia', serif;
      font-size: clamp(14px, 1.8vw, 22px);
      line-height: 1.9;
      padding: 3vh 3vw;
      resize: none; outline: none;
      min-height: 30vh;
      caret-color: rgba(180,100,255,0.9);
      backdrop-filter: blur(4px);
      transition: border-color 0.3s, box-shadow 0.3s;
    }
    #truth-journal:focus {
      border-color: rgba(180,100,255,0.4);
      box-shadow: 0 0 30px rgba(160,80,255,0.12), inset 0 0 20px rgba(100,60,200,0.05);
    }
    #truth-journal::placeholder { color: rgba(255,255,255,0.2); font-style: italic; }
    #truth-playback-view {
      display: none; width: 100%; min-height: 30vh;
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(180,100,255,0.2); border-radius: 4px;
      padding: 3vh 3vw;
      font-family: 'Georgia', serif;
      font-size: clamp(14px, 1.8vw, 22px); line-height: 1.9;
      color: rgba(255,255,255,0.3);
      overflow-y: auto; backdrop-filter: blur(4px); word-break: break-word;
    }
    .tpl-letter { display: inline-block; }
    .tpl-space  { display: inline-block; width: 0.45em; }
    .tpl-newline{ display: block; height: 1.9em; }
    .tpl-letter.hit {
      color: #fff;
      text-shadow: 0 0 8px rgba(180,100,255,1), 0 0 22px rgba(120,80,255,0.9);
      transform: scale(1.35) translateY(-3px);
      transition: transform 0.06s, color 0.06s, text-shadow 0.06s;
    }
    .tpl-letter.decay {
      color: rgba(180,100,255,0.65);
      text-shadow: 0 0 10px rgba(180,100,255,0.4);
      transform: scale(1) translateY(0);
      transition: transform 0.45s, color 0.45s, text-shadow 0.45s;
    }
    #truth-bar-progress {
      width: 100%; height: 2px;
      background: rgba(255,255,255,0.06); border-radius: 1px; overflow: hidden;
    }
    #truth-bar-fill {
      height: 100%;
      background: linear-gradient(90deg, rgba(180,100,255,0.7), rgba(80,160,255,0.7));
      width: 0%;
    }
    #truth-controls {
      display: flex; gap: 1.8vw; align-items: center; justify-content: center;
    }
    #truth-bpm-label { color: rgba(255,255,255,0.3); font-size: clamp(10px,1vw,13px); letter-spacing:0.2em; }
    #truth-back {
      color: rgba(255,255,255,0.35); font-size: clamp(10px,1.1vw,15px);
      letter-spacing: 0.3em; text-transform: uppercase;
      cursor: pointer; user-select: none;
      text-shadow: 0 0 12px rgba(180,100,255,0.4); transition: color 0.3s;
    }
    #truth-back:hover { color: rgba(255,255,255,0.8); }

    /* ── Cosmic Storm button ── */
    #storm-btn {
      position: fixed; bottom: 3vh; right: 20px; z-index: 25;
      background: none;
      border: 1px solid rgba(255,255,255,0.18);
      border-radius: 3px;
      color: rgba(255,255,255,0.32);
      font-family: 'Georgia', serif;
      font-size: clamp(9px, 0.95vw, 13px);
      letter-spacing: 0.28em; text-transform: uppercase;
      padding: 0.55em 1.2em;
      cursor: pointer;
      transition: color 0.35s, border-color 0.35s, box-shadow 0.35s, background 0.35s;
      user-select: none;
    }
    #storm-btn:hover {
      color: rgba(255,255,255,0.75);
      border-color: rgba(0,220,255,0.45);
    }
    #storm-btn.active {
      color: #00eeff;
      border-color: rgba(0,220,255,0.7);
      background: rgba(0,60,80,0.35);
      box-shadow: 0 0 18px rgba(0,200,255,0.35), inset 0 0 10px rgba(0,180,255,0.1);
      animation: stormPulse 1.8s ease-in-out infinite;
    }
    @keyframes stormPulse { 0%,100%{box-shadow:0 0 18px rgba(0,200,255,0.35)} 50%{box-shadow:0 0 32px rgba(0,220,255,0.6)} }
    .truth-note-particle {
      position: fixed; pointer-events: none; z-index: 70;
      font-size: clamp(11px,1.4vw,17px);
      animation: floatUp 1.3s ease-out forwards; user-select: none;
    }
    @keyframes floatUp { 0%{opacity:1;transform:translateY(0) scale(1)} 100%{opacity:0;transform:translateY(-70px) scale(0.5)} }
    /* bar-active for truth playback */
    .tpl-word { display: inline; }
    .tpl-word.bar-active .tpl-letter:not(.hit):not(.decay) { color: rgba(255,255,255,0.2); }

    /* ── Navigation arrows (shown when zoomed in) ── */
    .nav-arrow {
      display: none;
      position: fixed; top: 0; bottom: 0; width: 100px; z-index: 66;
      align-items: center; justify-content: center;
      overflow: hidden; user-select: none;
      transition: background 0.5s;
    }
    #nav-prev { left: 0; background: linear-gradient(to right, rgba(0,8,24,0.60), transparent); }
    #nav-next { right: 0; background: linear-gradient(to left, rgba(0,8,24,0.60), transparent); }
    .nav-arrow.visible { display: flex; }
    /* countdown fill — rises from bottom over 2s on hover */
    .nav-fill {
      position: absolute; bottom: 0; left: 0; right: 0; height: 0%;
      background: linear-gradient(to top, rgba(0,220,255,0.22), transparent);
      pointer-events: none;
    }
    .nav-arrow.hovering .nav-fill {
      height: 100%;
      transition: height 2s linear;
    }
    /* label */
    .nav-label {
      position: relative; z-index: 1;
      display: flex; flex-direction: column; align-items: center; gap: 14px;
      color: rgba(255,255,255,0.28);
      transition: color 0.4s, text-shadow 0.4s;
      pointer-events: none;
    }
    .nav-arrow.hovering .nav-label {
      color: rgba(255,255,255,0.9);
      text-shadow: 0 0 22px rgba(0,220,255,0.8);
    }
    .nav-symbol {
      font-size: clamp(22px, 3vw, 40px);
      line-height: 1;
    }
    .nav-text {
      font-size: clamp(8px, 0.85vw, 11px);
      letter-spacing: 0.35em; text-transform: uppercase;
      writing-mode: vertical-rl;
    }
  </style>
</head>
<body>
<canvas id="main"></canvas>
<div id="tip"><span id="tip-name"></span><span id="tip-desc"></span></div>
<div id="back">&#8592; Return</div>
<div id="panel-dots">
  <div class="panel-dot active" data-panel="0"></div>
  <div class="panel-dot" data-panel="1"></div>
  <div class="panel-dot" data-panel="2"></div>
</div>
<div id="handle-layer"></div>
<div id="edit-bar">
  <span id="edit-hint">EDIT MODE — drag handles · press E to exit</span>
  <span id="edit-coords"></span>
</div>
<div id="modal">
  <iframe id="modal-frame" src="" frameborder="0"
    allow="autoplay; encrypted-media; picture-in-picture" allowfullscreen
    style="display:none"></iframe>
  <div id="modal-placeholder" style="display:none"></div>
  <div id="modal-close">&#x2715; Close</div>
</div>

<button id="storm-btn">Cosmic Storm</button>

<!-- Navigation arrows -->
<div id="nav-prev" class="nav-arrow">
  <div class="nav-fill"></div>
  <div class="nav-label"><span class="nav-symbol">←</span><span class="nav-text">Further</span></div>
</div>
<div id="nav-next" class="nav-arrow">
  <div class="nav-fill"></div>
  <div class="nav-label"><span class="nav-symbol">→</span><span class="nav-text">Further</span></div>
</div>

<!-- Truth writing overlay -->
<div id="truth-overlay">
  <div id="truth-ui">
    <div id="truth-question">What does Trūth mean to You?</div>
    <textarea id="truth-journal" placeholder="Write here… every letter sings."></textarea>
    <div id="truth-playback-view"></div>
    <div id="truth-bar-progress"><div id="truth-bar-fill"></div></div>
    <div id="truth-controls">
      <button class="ctrl-btn" id="truth-btn-play">&#9654; Play</button>
      <button class="ctrl-btn" id="truth-btn-stop" style="display:none">&#9632; Stop</button>
      <span id="truth-bpm-label">65 BPM · 1 word = 1 beat</span>
    </div>
    <div id="truth-back">&#8592; Return</div>
  </div>
</div>

<script>
const canvas   = document.getElementById('main');
const ctx      = canvas.getContext('2d');
const tip      = document.getElementById('tip');
const tipName  = document.getElementById('tip-name');
const tipDesc  = document.getElementById('tip-desc');
const back     = document.getElementById('back');
const modal    = document.getElementById('modal');
const mFrame   = document.getElementById('modal-frame');
const mPlace   = document.getElementById('modal-placeholder');
const mClose   = document.getElementById('modal-close');
let W, H;

function resize() { W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; }
resize();
window.addEventListener('resize', resize);

/* ═══ MOBILE DETECT ═══ */
const isMobile = () => window.matchMedia('(max-width: 768px)').matches;

/* ═══ MOBILE PANEL SWIPE ═══ */
let panelIndex = 0;
let panelOffsetX = 0;
let touchStartX = 0;
let touchDeltaX = 0;
let isSwiping = false;

const panelDots = document.querySelectorAll('.panel-dot');

function setPanel(idx) {
  panelIndex = Math.max(0, Math.min(2, idx));
  panelDots.forEach((d, i) => d.classList.toggle('active', i === panelIndex));
}

panelDots.forEach(d => {
  d.addEventListener('click', () => setPanel(parseInt(d.dataset.panel)));
});

canvas.addEventListener('touchstart', e => {
  if (!isMobile()) return;
  touchStartX = e.touches[0].clientX;
  touchDeltaX = 0;
  isSwiping = true;
}, { passive: true });

canvas.addEventListener('touchmove', e => {
  if (!isMobile() || !isSwiping) return;
  touchDeltaX = e.touches[0].clientX - touchStartX;
}, { passive: true });

canvas.addEventListener('touchend', e => {
  if (!isMobile() || !isSwiping) return;
  isSwiping = false;
  if (touchDeltaX < -50) setPanel(panelIndex + 1);
  else if (touchDeltaX > 50) setPanel(panelIndex - 1);
  touchDeltaX = 0;
});

/* ═══ IMAGE ═══ */
const img = new Image();
img.src = 'artwork.jpeg';

/* ═══ 12 UNIVERSE ZONES ═══
   nx/ny = center in 0-1 of displayed image, nrx/nry = radii 0-1
   type: 'youtube' | 'vimeo' | 'external' | 'internal' | 'placeholder'         */
const ZONES = [
  { nx:0.2352, ny:0.3111, nrx:0.1452, nry:0.1657,
    name:'The Gods Told Me To Relax', hoverText:'Listen to the full album',
    baseH:40,  label:'#ffaa00', type:'bandcamp', bcUrl:'https://bandcamp.com/EmbeddedPlayer/album=2211761745/size=large/bgcol=000000/linkcol=ffffff/artwork=small/transparent=true/' },

  { nx:0.5779, ny:0.5707, nrx:0.0563, nry:0.0643,
    name:'Peace', hoverText:'Unique Experiences in Extraordinary Settings',
    baseH:180, label:'#00ffcc', type:'external', url:'https://peace-drab.vercel.app/' },

  { nx:0.4951, ny:0.2283, nrx:0.1148, nry:0.1479,
    name:"L'Idée", hoverText:'Soundtrack to an animation masterpiece from 1933',
    baseH:60,  label:'#ffff00', type:'vimeo', videoId:'362345540' },

  { nx:0.0981, ny:0.1635, nrx:0.07, nry:0.12,
    name:'Temple', hoverText:'A surrealistic music video contemplating life and death',
    baseH:170, label:'#00ffcc', type:'youtube', url:'https://www.youtube.com/watch?v=syRB1RfUOwc' },

  { nx:0.7402, ny:0.1730, nrx:0.1699, nry:0.0869,
    name:'Rituelles', hoverText:'New Song: Check it out',
    baseH:320, label:'#ff2d78', type:'placeholder', msg:'Rituelles\n— Coming Soon —' },

  { nx:0.4562, ny:0.7836, nrx:0.0882, nry:0.0892,
    name:'Loopmachien', hoverText:'My personalized looping & sequencing software — try it out!',
    baseH:25,  label:'#ff6400', type:'external', url:'https://tristanriomusic.github.io/ipadmarssynth/' },

  { nx:0.8231, ny:0.7074, nrx:0.0910, nry:0.2195,
    name:'Exploration of Ideas', hoverText:'Collection of ideas',
    baseH:55,  label:'#aaff00', type:'placeholder', msg:'Exploration of Ideas\n— Coming Soon —' },

  { nx:0.2413, ny:0.8839, nrx:0.09, nry:0.12,
    name:'Truth', hoverText:'Every letter is a sound — write your truth!',
    baseH:280, label:'#cc44ff', type:'truth' },

  { nx:0.8735, ny:0.4145, nrx:0.1293, nry:0.1586,
    name:'Desert Dream', hoverText:'Is there life on Mars? How we turned a pirate ship to a spaceship',
    baseH:90,  label:'#ff8844', type:'placeholder', msg:'Desert Dream\n— Coming Soon —' },

  { nx:0.2029, ny:0.6201, nrx:0.0588, nry:0.1340,
    name:'Vuur!', hoverText:'I make music for fireshows',
    baseH:15,  label:'#ff3300', type:'placeholder', msg:'Vuur!\n— Coming Soon —' },

  { nx:0.755, ny:0.345, nrx:0.072, nry:0.095,
    name:'Darkness — Here we face our Demons', hoverText:'Enter the darkness',
    baseH:240, label:'#3322aa', type:'placeholder', msg:'Darkness\n— Here we face our Demons —',
    dark:true },

  { nx:0.6949, ny:0.6728, nrx:0.1293, nry:0.2261, cnrx:0.06, cnry:0.08,
    name:'Love', hoverText:'Street Art: Ode to the art of Busking',
    baseH:340, label:'#ff69b4', type:'placeholder', msg:'Love\n— Coming Soon —' },

  { nx:0.1322, ny:0.5400, nrx:0.04, nry:0.05,
    name:'Join Us', hoverText:'Join Us!',
    baseH:200, label:'#ffffff', type:'placeholder', msg:'Join Us!\n— Mailing list coming soon —' },
];

/* ═══ ZOOM STATE ═══ */
let zoomed = false, zoomTarget = null;
let zoomFrom = {tx:0, ty:0, scale:1};
let zoomCurrent = {tx:0, ty:0, scale:1};

/* ═══ TIME ═══ */
let t = 0;

/* ═══ COSMIC STORM ═══ */
let cosmicStorm = false;
const stormBtn = document.getElementById('storm-btn');
stormBtn.addEventListener('click', () => {
  cosmicStorm = !cosmicStorm;
  stormBtn.classList.toggle('active', cosmicStorm);
});

/* ═══ WARP STARFIELD ═══ */
const STAR_COLORS = ['#ffffff','#ffffff','#ffffff','#ffffff','#ffffff',
                     '#ffffff','#ffffff','#ffffff','#00ffff','#ffff00','#ff44aa'];
const NUM_WARP = 500;
const warpStars = [];

function makeWarpStar(spread) {
  const angle = Math.random() * Math.PI * 2;
  const dist  = spread ? Math.random() * Math.hypot(W||800, H||600) * 0.9 : Math.random() * 20 + 1;
  return { angle, dist, speed: 0.10 + Math.random() * 0.55,
           color: STAR_COLORS[Math.floor(Math.random() * STAR_COLORS.length)],
           size: Math.random() < 0.15 ? 2 : 1 };
}
for (let i = 0; i < NUM_WARP; i++) warpStars.push(makeWarpStar(true));

function drawWarpStars() {
  const cx = W / 2, cy = H / 2;
  const maxDist = Math.hypot(W, H) * 0.92;
  ctx.globalCompositeOperation = 'screen';
  for (const s of warpStars) {
    s.dist += s.speed * (1 + s.dist * 0.003);
    if (s.dist > maxDist) { Object.assign(s, makeWarpStar(false)); continue; }
    const px = cx + Math.cos(s.angle) * s.dist;
    const py = cy + Math.sin(s.angle) * s.dist;
    const trailLen = Math.min(s.dist * 0.12, 22) * (s.speed / 0.45);
    const tx2 = px - Math.cos(s.angle) * trailLen;
    const ty2 = py - Math.sin(s.angle) * trailLen;
    const bright = Math.min(s.dist / (maxDist * 0.08), 1);
    if (trailLen > 1) {
      ctx.beginPath(); ctx.moveTo(tx2, ty2); ctx.lineTo(px, py);
      ctx.strokeStyle = s.color;
      ctx.globalAlpha = bright * 1.0;
      ctx.lineWidth   = s.size;
      ctx.stroke();
    }
    ctx.globalAlpha = bright;
    ctx.fillStyle = s.color;
    ctx.fillRect(Math.floor(px), Math.floor(py), s.size, s.size);
  }
  ctx.globalAlpha = 1;
  ctx.lineWidth   = 1;
  ctx.globalCompositeOperation = 'source-over';
}

/* ═══ MOUSE ═══ */
let mx = 0, my = 0, hoveredZone = null;
canvas.addEventListener('mousemove', e => {
  mx = e.clientX; my = e.clientY;
  padX = e.clientX / W; padY = e.clientY / H;
});

canvas.addEventListener('click', e => {

/* ═══ HELPER: image layout ═══ */
function imgLayout() {
  const needsRot = img.naturalWidth < img.naturalHeight;
  const imgLW = needsRot ? img.naturalHeight : img.naturalWidth;
  const imgLH = needsRot ? img.naturalWidth  : img.naturalHeight;
  const scale = Math.min(W / imgLW, H / imgLH);
  const drawW = imgLW * scale, drawH = imgLH * scale;
  const ox = (W - drawW) / 2, oy = (H - drawH) / 2;
  return { needsRot, drawW, drawH, ox, oy };
}

/* ═══ MAIN DRAW ═══ */
function draw() {
  t++;
  ctx.fillStyle = '#000';
  ctx.fillRect(0, 0, W, H);

  if (!img.complete || !img.naturalWidth) { requestAnimationFrame(draw); return; }

  const { needsRot, drawW, drawH, ox, oy } = imgLayout();

  /* Mobile panel offset */
  let mobileOffsetX = 0;
  if (isMobile()) {
    mobileOffsetX = panelIndex * (drawW / 3);
  }

  /* ── Apply zoom transform ── */
  ctx.save();
  if (zoomed && zoomTarget) {
    const z = zoomCurrent;
    ctx.translate(W/2, H/2);
    ctx.scale(z.scale, z.scale);
    ctx.translate(-W/2 + z.tx, -H/2 + z.ty);
  } else if (isMobile() && mobileOffsetX !== 0) {
    ctx.translate(-mobileOffsetX, 0);
  }

  /* ── Detect hovered zone (before draw so we can boost deformation) ── */
  hoveredZone = null;
  for (let i = 0; i < ZONES.length; i++) {
    const z = ZONES[i];
    const zx = ox + z.nx * drawW, zy = oy + z.ny * drawH;
    const czrx = (z.cnrx !== undefined ? z.cnrx : z.nrx) * drawW * 1.5;
    const czry = (z.cnry !== undefined ? z.cnry : z.nry) * drawH * 1.5;
    if (!zoomed && Math.pow((mx + mobileOffsetX - zx) / czrx, 2) + Math.pow((my - zy) / czry, 2) < 1)
      hoveredZone = z;
  }

  /* ── Draw artwork: orb-gravity deformation makes lines warp and breathe ── */
  ctx.save();
  ctx.filter = 'contrast(12) brightness(1.4)';
  const NS = 60;

  function stripDisplace(si) {
    const syC = (si + 0.5) / NS;
    const sf = cosmicStorm ? 1.0 : 0.14; // storm factor — subtle vs wild

    // Base organic wave (horizontal shimmer)
    let wx = (Math.sin(t * 0.006 + si * 0.21) * 2.2
            + Math.sin(t * 0.010 + si * 0.13 + 1.4) * 1.1) * sf;
    // Width scale for depth illusion
    let wMod = 1.0 + Math.sin(t * 0.005 + si * 0.31) * 0.016 * sf;

    if (!cosmicStorm) return { wx, wMod }; // subtle: no orb gravity

    // Storm: orb gravity pulls strips toward each orb's gravitational field
    for (let i = 0; i < ZONES.length; i++) {
      const z = ZONES[i];
      const dp = t * 0.007 + i * 1.3;
      const orbY = z.ny + Math.cos(dp * 0.73) * 0.004;
      const orbX = z.nx + Math.sin(dp) * 0.005;
      const dy = syC - orbY;
      const str = z.dark ? 0.024 : 0.011;
      const hoverBoost = (hoveredZone === z) ? 2.2 : 1.0;
      const falloff = (str * hoverBoost) / (1.0 + 25 * dy * dy);
      const ph = t * 0.009 + i * 2.1;
      wx += (orbX - 0.5) * drawW * falloff * Math.sin(ph + si * 0.14);
      wMod += falloff * 0.5 * Math.abs(Math.sin(ph * 0.8 + si * 0.22));
      if (z.dark) {
        wx += Math.sin(t * 0.041 + si * 7.1 + i * 3.3) * drawW * falloff * 0.45;
        wx += Math.cos(t * 0.029 + si * 4.4 + i * 1.9) * drawW * falloff * 0.25;
      }
    }
    return { wx, wMod };
  }

  // Clip to image bounds so horizontal shimmer doesn't bleed outside
  ctx.save();
  ctx.beginPath(); ctx.rect(ox - 2, oy - 2, drawW + 4, drawH + 4); ctx.clip();

  if (needsRot) {
    ctx.translate(ox + drawW/2, oy + drawH/2);
    ctx.rotate(-Math.PI / 2);
    for (let si = 0; si < NS; si++) {
      const sy = si / NS, ey = (si + 1) / NS;
      const { wx, wMod } = stripDisplace(si);
      ctx.drawImage(img, sy*img.naturalWidth, 0, (ey-sy)*img.naturalWidth, img.naturalHeight,
        -drawH/2 + sy*drawH, -drawW/2 + wx, drawH/NS + 2, drawW * wMod);
    }
  } else {
    for (let si = 0; si < NS; si++) {
      const sy = si / NS, ey = (si + 1) / NS;
      const { wx, wMod } = stripDisplace(si);
      ctx.drawImage(img, 0, sy*img.naturalHeight, img.naturalWidth, (ey-sy)*img.naturalHeight,
        ox + wx, oy + si * (drawH/NS), (drawW + 3) * wMod, drawH/NS + 2);
    }
  }
  ctx.restore();
  ctx.filter = 'none';
  ctx.restore(); // clip
  ctx.filter = 'none';
  ctx.restore(); // filter

  /* ── Invert only the image rect → paper becomes black, transparent edges untouched ── */
  ctx.globalCompositeOperation = 'difference';
  ctx.fillStyle = '#ffffff';
  ctx.fillRect(ox, oy, drawW, drawH);
  ctx.globalCompositeOperation = 'source-over';

  /* ── Cover JPEG edge artifacts with a thin black border ── */
  ctx.strokeStyle = '#000';
  ctx.lineWidth = 4;
  ctx.strokeRect(ox, oy, drawW, drawH);

  /* ── Orb color halos — slow-breathing, no flashy effects ── */
  ctx.globalCompositeOperation = 'screen';
  for (let i = 0; i < ZONES.length; i++) {
    const z = ZONES[i];
    const zx  = ox + z.nx * drawW;
    const zy  = oy + z.ny * drawH;
    const zrx = z.nrx * drawW * 1.4;
    const zry = z.nry * drawH * 1.4;
    // Slow gentle breathing — no fast flash
    const alpha = (hoveredZone === z ? 0.72 : 0.42) + 0.10 * Math.sin(t * 0.006 + i * 0.9);
    ctx.save();
    ctx.translate(zx, zy);
    ctx.scale(1, zry / zrx);
    if (z.dark) {
      // Darkness: soft dark-blue wash
      const g = ctx.createRadialGradient(0, 0, 0, 0, 0, zrx);
      g.addColorStop(0,   `rgba(10,5,40,${alpha * 0.7})`);
      g.addColorStop(0.55,`rgba(20,10,60,${alpha * 0.4})`);
      g.addColorStop(1,   'transparent');
      ctx.beginPath(); ctx.arc(0, 0, zrx, 0, Math.PI * 2);
      ctx.fillStyle = g; ctx.fill();
    } else {
      const hue = z.baseH;
      const g = ctx.createRadialGradient(0, 0, 0, 0, 0, zrx);
      g.addColorStop(0,   `hsla(${hue},90%,72%,${alpha})`);
      g.addColorStop(0.5, `hsla(${hue},80%,50%,${alpha * 0.45})`);
      g.addColorStop(1,   'transparent');
      ctx.beginPath(); ctx.arc(0, 0, zrx, 0, Math.PI * 2);
      ctx.fillStyle = g; ctx.fill();
    }
    ctx.restore();
  }
  ctx.globalCompositeOperation = 'source-over';

  /* ── Warp starfield ── */
  drawWarpStars();

  /* ── Twinkling stars — slow, varied palette ── */
  ctx.globalCompositeOperation = 'screen';
  const palette = ['#ffffff','#00ffff','#ff00ff','#ffff00','#ffffff','#ffffff'];
  for (let i = 0; i < 180; i++) {
    const sx = (Math.sin(i * 127.1) * 0.5 + 0.5) * W;
    const sy = (Math.cos(i * 311.7) * 0.5 + 0.5) * H;
    const sa = 0.2 + 0.8 * Math.abs(Math.sin(t * 0.013 + i * 0.7));
    const sr = 0.4 + 0.8 * Math.abs(Math.sin(i * 43.3));
    ctx.globalAlpha = sa;
    ctx.fillStyle = palette[i % palette.length];
    ctx.fillRect(Math.floor(sx), Math.floor(sy), sr < 0.7 ? 1 : 2, sr < 0.7 ? 1 : 2);
  }
  ctx.globalAlpha = 1;
  ctx.globalCompositeOperation = 'source-over';

  /* ── Occasional horizontal glitch ── */
  if (t % 380 < 3) {
    const gy = Math.floor(H * 0.2 + Math.sin(t) * H * 0.3);
    ctx.globalCompositeOperation = 'screen';
    ctx.globalAlpha = 0.14;
    ctx.fillStyle = '#00ffff';
    ctx.fillRect(0, gy, W, 2);
    ctx.globalAlpha = 1;
    ctx.globalCompositeOperation = 'source-over';
  }

  /* ── Vignette ── */
  const vig = ctx.createRadialGradient(W/2, H/2, H*0.4, W/2, H/2, H*0.9);
  vig.addColorStop(0, 'transparent');
  vig.addColorStop(1, 'rgba(0,0,0,0.4)');
  ctx.fillStyle = vig;
  ctx.fillRect(0, 0, W, H);

  ctx.restore(); // pop zoom / mobile offset

  /* ── Tooltip ── */
  if (hoveredZone && !zoomed) {
    tipName.textContent = hoveredZone.name;
    tipName.style.color = hoveredZone.label;
    tipName.style.textShadow = `0 0 14px ${hoveredZone.label}`;
    tipDesc.textContent = hoveredZone.hoverText;
    tip.style.left = (mx + 20) + 'px';
    tip.style.top  = (my - 14) + 'px';
    tip.style.opacity = '1';
  } else {
    tip.style.opacity = '0';
  }

  requestAnimationFrame(draw);
}
draw();

/* ═══ ZOOM IN/OUT ═══ */
function zoomIn(zone) {
  zoomed = true;
  zoomTarget = zone;
  zoomFrom = { tx:0, ty:0, scale:1 };
  const { drawW, drawH, ox, oy } = imgLayout();
  const zx = ox + zone.nx * drawW;
  const zy = oy + zone.ny * drawH;
  const targetScale = 4.0;
  const tx = W/2 - zx;
  const ty = H/2 - zy;
  animateZoom(zoomFrom, { tx, ty, scale: targetScale }, 650, () => {
    openZoneContent(zone);
    showNavArrows(true);
  });
  back.textContent = `↑ ${zone.name} — click or ESC to return`;
}

function zoomOut() {
  closeModal();
  closeTruthOverlay();
  showNavArrows(false);
  animateZoom(zoomCurrent, { tx:0, ty:0, scale:1 }, 500, () => {
    zoomed = false;
    zoomTarget = null;
    back.textContent = '← Return';
  });
}

function animateZoom(from, to, durationMs, onDone) {
  const start = performance.now();
  const f = {...from};
  function step(now) {
    const p = Math.min((now - start) / durationMs, 1);
    const e = 1 - Math.pow(1 - p, 3);
    zoomCurrent.tx    = f.tx    + (to.tx    - f.tx)    * e;
    zoomCurrent.ty    = f.ty    + (to.ty    - f.ty)    * e;
    zoomCurrent.scale = f.scale + (to.scale - f.scale) * e;
    if (p < 1) requestAnimationFrame(step);
    else { Object.assign(zoomCurrent, to); if (onDone) onDone(); }
  }
  requestAnimationFrame(step);
}

/* ═══ ZONE CONTENT ═══ */
function openZoneContent(zone) {
  if (zone.type === 'internal') {
    window.location.href = zone.url;
    return;
  }
  if (zone.type === 'external') {
    window.open(zone.url, '_blank');
    // stay zoomed in — user exits manually
    back.textContent = `↑ ${zone.name} — click or ESC to return`;
    return;
  }
  if (zone.type === 'bandcamp') {
    showFrame(zone.bcUrl + 'autoplay=1/');
    return;
  }
  if (zone.type === 'youtube') {
    const m = zone.url.match(/[?&]v=([^&]+)/);
    if (m) showFrame(`https://www.youtube.com/embed/${m[1]}?autoplay=1&rel=0`);
    return;
  }
  if (zone.type === 'vimeo') {
    showFrame(`https://player.vimeo.com/video/${zone.videoId}?autoplay=1`);
    return;
  }
  if (zone.type === 'truth') {
    document.getElementById('truth-overlay').classList.add('visible');
    setTimeout(() => document.getElementById('truth-journal').focus(), 300);
    return;
  }
  if (zone.type === 'placeholder') {
    showPlaceholder(zone.msg, zone.label);
    return;
  }
}

function showFrame(src) {
  mFrame.src = src;
  mFrame.style.display = 'block';
  mPlace.style.display = 'none';
  modal.classList.add('visible');
}

function showPlaceholder(msg, color) {
  mFrame.style.display = 'none';
  mFrame.src = '';
  mPlace.style.display = 'block';
  mPlace.textContent = msg;
  mPlace.style.color = color || 'rgba(255,255,255,0.75)';
  mPlace.style.textShadow = `0 0 40px ${color || '#fff'}`;
  modal.classList.add('visible');
}

function closeModal() {
  const wasBandcamp = mFrame.style.display === 'block' && mFrame.src.includes('bandcamp');
  modal.classList.remove('visible');
  mFrame.src = '';
  mFrame.style.display = 'none';
  mPlace.style.display = 'none';
  if (wasBandcamp && window.miniPlayerShow) window.miniPlayerShow();
}

/* ═══ XY GRANULAR SYNTH (NEBULA) ═══ */
let ac = null, masterGain, masterEQ, masterComp, masterClip;
let revPre, revNode, revWet, revHP, revLP, shimGain;
let delNode, delFb, delDamp, delHP2, delSat, delWet;
let padX = 0.5, padY = 0.5;
let grainTimer = null, synthStarted = false, synthOn = false;

const PRESET = { grainMs:220, scatter:0.12, pitchRange:7, spawnRate:0.11,
                 revAmt:0.80, dlyAmt:0.28, harmonics:true, atk:0.25, rel:0.70 };

function buildReverbIR(size, decay) {
  const sr = ac.sampleRate;
  const len = Math.floor(sr * size);
  const buf = ac.createBuffer(2, len, sr);
  for (let ch = 0; ch < 2; ch++) {
    const d = buf.getChannelData(ch);
    let lp1=0, lp2=0;
    for (let i=0; i<len; i++) {
      const tn = i/len, noise = Math.random()*2-1;
      lp1 = lp1*0.80 + noise*0.20; lp2 = lp2*0.80 + lp1*0.20;
      d[i] = (lp2*Math.pow(1-tn,decay*2.6) + noise*0.15*Math.pow(1-tn,decay*7.5))*0.7;
    }
  }
  return buf;
}

function makeDelSatCurve() {
  const s=512, c=new Float32Array(s);
  for (let i=0; i<s; i++) { const x=(i*2)/s-1; c[i]=Math.tanh(x*1.6)/1.6; }
  return c;
}

function initAudio() {
  if (ac) return;
  ac = new (window.AudioContext || window.webkitAudioContext)();
  masterEQ = ac.createBiquadFilter(); masterEQ.type='lowpass'; masterEQ.frequency.value=16000;
  masterGain = ac.createGain(); masterGain.gain.value=0.45;
  masterComp = ac.createDynamicsCompressor();
  masterComp.threshold.value=-6; masterComp.ratio.value=20; masterComp.attack.value=0.001; masterComp.release.value=0.1;
  masterClip = ac.createWaveShaper();
  const cc = new Float32Array(65536);
  for (let i=0; i<65536; i++) { const x=(i/65536)*2-1; cc[i]=Math.max(-0.98,Math.min(0.98,x)); }
  masterClip.curve=cc; masterClip.oversample='2x';
  masterEQ.connect(masterGain); masterGain.connect(masterComp); masterComp.connect(masterClip); masterClip.connect(ac.destination);

  revPre = ac.createDelay(0.5); revPre.delayTime.value=0.01;
  revNode = ac.createConvolver(); revNode.buffer=buildReverbIR(3.5,0.55);
  revWet = ac.createGain(); revWet.gain.value=0.35;
  revHP = ac.createBiquadFilter(); revHP.type='highpass'; revHP.frequency.value=80;
  revLP = ac.createBiquadFilter(); revLP.type='lowpass'; revLP.frequency.value=8000;
  shimGain = ac.createGain(); shimGain.gain.value=0.08;
  revPre.connect(revNode); revNode.connect(revHP); revHP.connect(revLP); revLP.connect(revWet); revWet.connect(masterEQ);
  revNode.connect(shimGain); shimGain.connect(masterEQ);

  delNode = ac.createDelay(5.0); delNode.delayTime.value=0.375;
  delFb = ac.createGain(); delFb.gain.value=0.5;
  delDamp = ac.createBiquadFilter(); delDamp.type='lowpass'; delDamp.frequency.value=3200;
  delHP2 = ac.createBiquadFilter(); delHP2.type='highpass'; delHP2.frequency.value=90;
  delSat = ac.createWaveShaper(); delSat.curve=makeDelSatCurve(); delSat.oversample='2x';
  delWet = ac.createGain(); delWet.gain.value=0.28;
  delNode.connect(delDamp); delDamp.connect(delHP2); delHP2.connect(delSat); delSat.connect(delFb); delFb.connect(delNode);
  delNode.connect(delWet); delWet.connect(masterEQ);
}

function spawnGrain() {
  if (!ac) return;
  const p = PRESET;
  const vol = 0.25 + padY * 0.5;
  const now = ac.currentTime;
  const durS = Math.max(0.01, p.grainMs/1000);
  const buf = ac.createBuffer(2, Math.floor(ac.sampleRate*durS), ac.sampleRate);
  const hz = 110 * Math.pow(2, padX * 3);
  for (let ch=0; ch<2; ch++) {
    const d = buf.getChannelData(ch);
    for (let i=0; i<d.length; i++) d[i] = Math.sin(2*Math.PI*hz*(i/ac.sampleRate))*(1-i/d.length);
  }
  const grainDur = Math.max(0.005, (p.grainMs/1000)*(0.5+padY));
  const scatter = (Math.random()-0.5)*p.scatter*grainDur;
  const offset = Math.max(0, Math.min(buf.duration-0.001, padX*Math.max(0,buf.duration-grainDur)+scatter));
  const playDur = Math.min(grainDur, buf.duration-offset);
  const pitchSt = (0.5-padY)*p.pitchRange;
  const detC = (Math.random()-0.5)*p.scatter*180;

  const spawnOne = (ps, dc, vm) => {
    const src = ac.createBufferSource(); src.buffer=buf;
    src.playbackRate.value = Math.pow(2, ps/12); src.detune.value=dc;
    const env = ac.createGain();
    const ak = Math.max(0.003, playDur*p.atk), rl = Math.max(0.005, playDur*p.rel);
    env.gain.setValueAtTime(0,now);
    env.gain.linearRampToValueAtTime(vol*vm, now+ak);
    env.gain.exponentialRampToValueAtTime(0.0001, now+Math.max(ak+0.002, playDur*(p.atk+p.rel)));
    src.connect(env); env.connect(masterEQ);
    if (p.revAmt>0.01) { const rv=ac.createGain(); rv.gain.value=p.revAmt*0.7; env.connect(rv); rv.connect(revPre); }
    if (p.dlyAmt>0.01) { const dl=ac.createGain(); dl.gain.value=p.dlyAmt; env.connect(dl); dl.connect(delNode); }
    src.start(now, offset, Math.max(0.001, playDur));
  };
  spawnOne(pitchSt, detC, 1.0);
  if (p.harmonics) {
    if (Math.random()<0.4) spawnOne(pitchSt+12, detC+15, 0.22);
    if (Math.random()<0.25) spawnOne(pitchSt-12, detC-8, 0.18);
  }
}

/* ═══ EDIT MODE ═══ */
let editMode = false;
const handleLayer = document.getElementById('handle-layer');
const editBar     = document.getElementById('edit-bar');
const editCoords  = document.getElementById('edit-coords');
const handles     = [];

function buildHandles() {
  handleLayer.innerHTML = '';
  handles.length = 0;
  ZONES.forEach((z, i) => {
    /* ── Center drag handle ── */
    const el = document.createElement('div');
    el.className = 'zone-handle';
    el.style.color = z.label;
    el.style.borderColor = z.label;
    el.style.background = z.label + '55';
    const lbl = document.createElement('div');
    lbl.className = 'zone-handle-label';
    lbl.textContent = z.name;
    el.appendChild(lbl);
    handleLayer.appendChild(el);
    handles.push(el);
    positionHandle(el, z);

    el.style.pointerEvents = 'auto';
    let dragging = false;
    el.addEventListener('mousedown', e => {
      dragging = true; e.stopPropagation();
      el.style.cursor = 'grabbing';
      el.style.zIndex = 90;
    });
    document.addEventListener('mousemove', e => {
      if (!dragging) return;
      const { drawW, drawH, ox: imgOx, oy: imgOy } = imgLayout();
      z.nx = Math.max(0, Math.min(1, (e.clientX - imgOx) / drawW));
      z.ny = Math.max(0, Math.min(1, (e.clientY - imgOy) / drawH));
      positionHandle(el, z);
      positionSizeHandles(i, z);
      updateCoordReadout();
    });
    document.addEventListener('mouseup', () => {
      if (dragging) { dragging = false; el.style.cursor = 'grab'; }
    });

    /* ── East handle (controls nrx) ── */
    const eH = document.createElement('div');
    eH.className = 'zone-size-handle';
    eH.style.color = z.label;
    eH.style.borderColor = z.label;
    eH.style.background = z.label + '88';
    eH.dataset.zoneIdx = i;
    eH.dataset.axis = 'E';
    handleLayer.appendChild(eH);
    positionSizeHandle(eH, z, 'E');

    eH.style.pointerEvents = 'auto';
    let eDragging = false;
    eH.addEventListener('mousedown', e => { eDragging = true; e.stopPropagation(); });
    document.addEventListener('mousemove', e => {
      if (!eDragging) return;
      const { drawW, drawH, ox: imgOx, oy: imgOy } = imgLayout();
      const zx = imgOx + z.nx * drawW;
      z.nrx = Math.max(0.01, Math.abs(e.clientX - zx) / (drawW * 1.5));
      positionSizeHandle(eH, z, 'E');
      updateCoordReadout();
    });
    document.addEventListener('mouseup', () => { eDragging = false; });

    /* ── North handle (controls nry) ── */
    const nH = document.createElement('div');
    nH.className = 'zone-size-handle';
    nH.style.color = z.label;
    nH.style.borderColor = z.label;
    nH.style.background = z.label + '88';
    nH.dataset.zoneIdx = i;
    nH.dataset.axis = 'N';
    handleLayer.appendChild(nH);
    positionSizeHandle(nH, z, 'N');

    nH.style.pointerEvents = 'auto';
    let nDragging = false;
    nH.addEventListener('mousedown', e => { nDragging = true; e.stopPropagation(); });
    document.addEventListener('mousemove', e => {
      if (!nDragging) return;
      const { drawW, drawH, ox: imgOx, oy: imgOy } = imgLayout();
      const zy = imgOy + z.ny * drawH;
      z.nry = Math.max(0.01, Math.abs(e.clientY - zy) / (drawH * 1.5));
      positionSizeHandle(nH, z, 'N');
      updateCoordReadout();
    });
    document.addEventListener('mouseup', () => { nDragging = false; });
  });
}

function positionHandle(el, z) {
  const { drawW, drawH, ox, oy } = imgLayout();
  el.style.left = (ox + z.nx * drawW) + 'px';
  el.style.top  = (oy + z.ny * drawH) + 'px';
}

function positionSizeHandle(el, z, axis) {
  const { drawW, drawH, ox, oy } = imgLayout();
  if (axis === 'E') {
    el.style.left = (ox + z.nx * drawW + z.nrx * drawW * 1.5) + 'px';
    el.style.top  = (oy + z.ny * drawH) + 'px';
  } else { // N
    el.style.left = (ox + z.nx * drawW) + 'px';
    el.style.top  = (oy + z.ny * drawH - z.nry * drawH * 1.5) + 'px';
  }
}

function positionSizeHandles(idx, z) {
  // Re-position size handles after center drag
  const sizeHandles = handleLayer.querySelectorAll('.zone-size-handle');
  // They are appended in pairs: [E0, N0, E1, N1, ...]
  const eH = sizeHandles[idx * 2];
  const nH = sizeHandles[idx * 2 + 1];
  if (eH) positionSizeHandle(eH, z, 'E');
  if (nH) positionSizeHandle(nH, z, 'N');
}

function updateCoordReadout() {
  editCoords.textContent = ZONES.map((z, i) =>
    `[${i}] nx:${z.nx.toFixed(3)} ny:${z.ny.toFixed(3)} nrx:${z.nrx.toFixed(3)} nry:${z.nry.toFixed(3)}`
  ).join('  |  ');
}

function refreshHandlePositions() {
  ZONES.forEach((z, i) => {
    positionHandle(handles[i], z);
    positionSizeHandles(i, z);
  });
}

function enterEditMode() {
  editMode = true;
  buildHandles();
  handleLayer.classList.add('visible');
  editBar.classList.add('visible');
  handleLayer.style.pointerEvents = 'none'; // handles are auto
  updateCoordReadout();
  document.body.classList.add('edit-mode');
}

function exitEditMode() {
  editMode = false;
  handleLayer.classList.remove('visible');
  editBar.classList.remove('visible');
  document.body.classList.remove('edit-mode');
}

document.addEventListener('keydown', e => {
  if (e.key === 'e' || e.key === 'E') {
    if (editMode) exitEditMode(); else enterEditMode();
  }
});

window.addEventListener('resize', () => { if (editMode) refreshHandlePositions(); });

/* ═══ TRUTH OVERLAY ═══ */
const TRUTH_LYDIAN = [0, 2, 4, 6, 7, 9, 11];
const TRUTH_ROOT   = 82.41; // E2
const TRUTH_BPM    = 65;
const TRUTH_BAR    = 60 / TRUTH_BPM;
const TRUTH_SYMS   = ['♩','♪','♫','♬'];

let truth_mGain = null, truth_revNode = null, truth_revWet = null;
let truth_playing = false, truth_timers = [], truth_rafId = null;
let truth_startAC = null, truth_startWall = null, truth_totalBars = 0;

function truth_hz(degree) {
  const oct = Math.floor(degree / 7), step = degree % 7;
  return TRUTH_ROOT * Math.pow(2, oct) * Math.pow(2, TRUTH_LYDIAN[step] / 12);
}
function truth_charDeg(ch) {
  const c = ch.toLowerCase().charCodeAt(0);
  return (c < 97 || c > 122) ? 0 : Math.round((c - 97) / 25 * 13);
}
function truth_buildIR(sec) {
  const sr = ac.sampleRate, len = Math.floor(sr * sec);
  const buf = ac.createBuffer(2, len, sr);
  for (let ch = 0; ch < 2; ch++) {
    const d = buf.getChannelData(ch); let lp = 0;
    for (let i = 0; i < len; i++) {
      const n = Math.random()*2-1; lp = lp*0.82 + n*0.18;
      d[i] = lp * Math.pow(1 - i/len, 2.2);
    }
  }
  return buf;
}
function truth_initAudio() {
  initAudio();
  if (truth_mGain) return;
  if (ac.state === 'suspended') ac.resume();
  truth_mGain = ac.createGain(); truth_mGain.gain.value = 0.40;
  truth_mGain.connect(masterEQ);
  truth_revNode = ac.createConvolver(); truth_revNode.buffer = truth_buildIR(2.8);
  truth_revWet  = ac.createGain(); truth_revWet.gain.value = 0.42;
  truth_revNode.connect(truth_revWet); truth_revWet.connect(truth_mGain);
}
function truth_kick(t) {
  const env = ac.createGain(); env.gain.setValueAtTime(0.22, t); env.gain.exponentialRampToValueAtTime(0.0001, t+0.9);
  const osc = ac.createOscillator(); osc.frequency.setValueAtTime(80, t); osc.frequency.exponentialRampToValueAtTime(42, t+0.25);
  osc.connect(env); env.connect(truth_mGain); osc.start(t); osc.stop(t+1.0);
}
function truth_hihat(t) {
  const bufSz = Math.floor(ac.sampleRate * 0.08), buf = ac.createBuffer(1, bufSz, ac.sampleRate);
  const d = buf.getChannelData(0); for (let i=0; i<bufSz; i++) d[i]=Math.random()*2-1;
  const src = ac.createBufferSource(); src.buffer = buf;
  const hp = ac.createBiquadFilter(); hp.type='highpass'; hp.frequency.value=9000;
  const env = ac.createGain(); env.gain.setValueAtTime(0.16, t); env.gain.exponentialRampToValueAtTime(0.0001, t+0.07);
  src.connect(hp); hp.connect(env); env.connect(truth_mGain); src.start(t); src.stop(t+0.09);
}
function truth_snare(t) {
  const bufSz = Math.floor(ac.sampleRate*0.18), buf=ac.createBuffer(1,bufSz,ac.sampleRate);
  const d=buf.getChannelData(0); for(let i=0;i<bufSz;i++) d[i]=Math.random()*2-1;
  const src=ac.createBufferSource(); src.buffer=buf;
  const bp=ac.createBiquadFilter(); bp.type='bandpass'; bp.frequency.value=2200; bp.Q.value=0.7;
  const nEnv=ac.createGain(); nEnv.gain.setValueAtTime(0.24,t); nEnv.gain.exponentialRampToValueAtTime(0.0001,t+0.16);
  src.connect(bp); bp.connect(nEnv); nEnv.connect(truth_mGain); src.start(t); src.stop(t+0.18);
  const osc=ac.createOscillator(); osc.frequency.value=200;
  const oEnv=ac.createGain(); oEnv.gain.setValueAtTime(0.18,t); oEnv.gain.exponentialRampToValueAtTime(0.0001,t+0.07);
  osc.connect(oEnv); oEnv.connect(truth_mGain); osc.start(t); osc.stop(t+0.09);
}
function truth_note(hz, t, durS, vol=0.15) {
  const env=ac.createGain(), atk=Math.min(0.05,durS*0.2), rel=Math.min(0.5,durS*0.7);
  env.gain.setValueAtTime(0,t); env.gain.linearRampToValueAtTime(vol,t+atk);
  env.gain.exponentialRampToValueAtTime(0.0001,t+atk+rel);
  env.connect(truth_mGain); env.connect(truth_revNode);
  for (const det of [-4,0,5]) {
    const osc=ac.createOscillator(); osc.type='sine'; osc.frequency.value=hz; osc.detune.value=det;
    const g=ac.createGain(); g.gain.value=det===0?0.6:0.2;
    osc.connect(g); g.connect(env); osc.start(t); osc.stop(t+atk+rel+0.05);
  }
}
function truth_particle(el) {
  const ref = el || document.getElementById('truth-journal');
  const rect = ref.getBoundingClientRect();
  const div = document.createElement('div');
  div.className = 'truth-note-particle';
  div.textContent = TRUTH_SYMS[Math.floor(Math.random()*TRUTH_SYMS.length)];
  div.style.left  = (rect.left + Math.random()*rect.width) + 'px';
  div.style.top   = (rect.top  + Math.random()*rect.height*0.8) + 'px';
  div.style.color = `hsl(${240+Math.random()*80},80%,75%)`;
  document.body.appendChild(div);
  setTimeout(() => div.remove(), 1400);
}

document.getElementById('truth-journal').addEventListener('keydown', e => {
  if (e.key.length !== 1 && e.key !== 'Enter') return;
  truth_initAudio();
  const jrnl = document.getElementById('truth-journal');
  const pos = jrnl.selectionStart, text = jrnl.value;
  const lineStart = text.lastIndexOf('\n', pos-1)+1;
  const col = pos - lineStart;
  const line = text.substring(0,pos).split('\n').length;
  const hz = truth_hz(col % 14) * Math.pow(2, Math.min(line-1,2));
  truth_note(hz, ac.currentTime, 1.2);
  truth_particle(null);
});

function truth_buildDOM(text) {
  const pv = document.getElementById('truth-playback-view');
  pv.innerHTML = '';
  const tokens = []; let buf = '';
  for (const ch of text) {
    if (ch===' '||ch==='\n') { if (buf) { tokens.push({type:'word',text:buf}); buf=''; } tokens.push({type:ch==='\n'?'newline':'space'}); }
    else buf += ch;
  }
  if (buf) tokens.push({type:'word',text:buf});
  const spans=[], wraps=[]; let wi=0;
  for (const tok of tokens) {
    if (tok.type==='space') { const s=document.createElement('span'); s.className='tpl-space'; pv.appendChild(s); }
    else if (tok.type==='newline') { const b=document.createElement('div'); b.className='tpl-newline'; pv.appendChild(b); }
    else {
      const w=document.createElement('span'); w.className='tpl-word'; w.dataset.wordIdx=wi; wraps.push(w);
      for (let li=0;li<tok.text.length;li++) {
        const s=document.createElement('span'); s.className='tpl-letter'; s.textContent=tok.text[li];
        w.appendChild(s); spans.push({span:s,wordIdx:wi,letterIdx:li,char:tok.text[li]});
      }
      pv.appendChild(w); wi++;
    }
  }
  return {spans, wraps, wordCount:wi};
}

function startTruthPlayback() {
  const text = document.getElementById('truth-journal').value.trim();
  if (!text) return;
  truth_initAudio();
  truth_playing = true;
  const jrnl=document.getElementById('truth-journal'), pv=document.getElementById('truth-playback-view');
  const bf=document.getElementById('truth-bar-fill'), bp=document.getElementById('truth-btn-play'), bs=document.getElementById('truth-btn-stop');
  jrnl.style.display='none'; pv.style.display='block';
  bp.style.display='none'; bs.style.display=''; bs.classList.add('active');
  bf.style.width='0%';
  const {spans,wraps,wordCount}=truth_buildDOM(text);
  truth_totalBars=wordCount; truth_startAC=ac.currentTime+0.1; truth_startWall=performance.now()+100;
  for (let b=0;b<wordCount;b++) {
    const bT=truth_startAC+b*TRUTH_BAR;
    truth_kick(bT); truth_hihat(bT); truth_hihat(bT+TRUTH_BAR*0.5);
    if (b%2===1) truth_snare(bT);
  }
  for (let wi=0;wi<wordCount;wi++) {
    const barStart=wi*TRUTH_BAR, letters=spans.filter(l=>l.wordIdx===wi), n=letters.length, ni=TRUTH_BAR/n;
    truth_timers.push(setTimeout(()=>{ wraps.forEach(w=>w.classList.remove('bar-active')); if(wraps[wi]) wraps[wi].classList.add('bar-active'); }, barStart*1000));
    for (let li=0;li<n;li++) {
      const {span,char}=letters[li], off=barStart+li*ni, vol=0.10+(truth_charDeg(char)/13)*0.08;
      const oct=Math.floor(li/7)%3;
      truth_note(truth_hz(truth_charDeg(char))*Math.pow(2,oct), truth_startAC+off, ni*0.85, vol);
      truth_timers.push(setTimeout(()=>{
        span.classList.remove('decay'); span.classList.add('hit'); truth_particle(span);
        setTimeout(()=>{ span.classList.remove('hit'); span.classList.add('decay'); },120);
      }, off*1000));
    }
  }
  const totalDur=wordCount*TRUTH_BAR*1000;
  (function animBar() {
    if (!truth_playing) return;
    const pct=Math.min((performance.now()-truth_startWall)/totalDur*100,100);
    bf.style.width=pct+'%';
    if (pct<100) truth_rafId=requestAnimationFrame(animBar); else setTimeout(stopTruthPlayback,800);
  })();
}

function stopTruthPlayback() {
  truth_playing=false; truth_timers.forEach(clearTimeout); truth_timers=[];
  if (truth_rafId) { cancelAnimationFrame(truth_rafId); truth_rafId=null; }
  const pv=document.getElementById('truth-playback-view'), bf=document.getElementById('truth-bar-fill');
  const bp=document.getElementById('truth-btn-play'), bs=document.getElementById('truth-btn-stop');
  const jrnl=document.getElementById('truth-journal');
  pv.querySelectorAll('.tpl-word').forEach(w=>w.classList.remove('bar-active'));
  bf.style.width='0%'; pv.style.display='none'; jrnl.style.display='';
  bs.style.display='none'; bs.classList.remove('active'); bp.style.display='';
}

function closeTruthOverlay() {
  stopTruthPlayback();
  document.getElementById('truth-overlay').classList.remove('visible');
}

document.getElementById('truth-btn-play').addEventListener('click', startTruthPlayback);
document.getElementById('truth-btn-stop').addEventListener('click', stopTruthPlayback);
document.getElementById('truth-back').addEventListener('click', closeTruthOverlay);
document.getElementById('truth-overlay').addEventListener('click', e => {
  if (e.target === document.getElementById('truth-overlay')) closeTruthOverlay();
});

function navigateSpatial(dir) {
  if (!zoomTarget) return;
  const idx = ZONES_BY_X.indexOf(zoomTarget);
  const next = ZONES_BY_X[(idx + dir + ZONES_BY_X.length) % ZONES_BY_X.length];
  navigateToZone(next);
}

let navTimers = { prev: null, next: null };

function startNavHover(el, dir, key) {
  el.classList.add('hovering');
  navTimers[key] = setTimeout(() => {
    el.classList.remove('hovering');
    navigateSpatial(dir);
  }, 2000);
}

function cancelNavHover(el, key) {
  if (key && navTimers[key]) { clearTimeout(navTimers[key]); navTimers[key] = null; }
  if (el) el.classList.remove('hovering');
}

navPrev.addEventListener('mouseenter', () => startNavHover(navPrev, -1, 'prev'));
navPrev.addEventListener('mouseleave', () => cancelNavHover(navPrev, 'prev'));
navNext.addEventListener('mouseenter', () => startNavHover(navNext,  1, 'next'));
navNext.addEventListener('mouseleave', () => cancelNavHover(navNext, 'next'));

/* ═══ CURSOR FX — PIRATE SHIP + WARP DRIVE + RIPPLE ═══ */
(function() {
  const cc_canvas = document.createElement('canvas');
  cc_canvas.style.cssText = 'position:fixed;top:0;left:0;width:100%;height:100%;z-index:9999;pointer-events:none;';
  document.body.appendChild(cc_canvas);
  const cc = cc_canvas.getContext('2d');

  function resize() { cc_canvas.width = window.innerWidth; cc_canvas.height = window.innerHeight; }
  resize();
  window.addEventListener('resize', resize);

  let mx = window.innerWidth / 2, my = window.innerHeight / 2;
  let prevMx = mx, prevMy = my;
  let shipAngle = 0, smoothAngle = 0, speed = 0, frame = 0;
  const WARP = [], RIPPLES = [];

  document.addEventListener('mousemove', e => {
    prevMx = mx; prevMy = my;
    mx = e.clientX; my = e.clientY;
    const dx = mx - prevMx, dy = my - prevMy;
    speed = Math.sqrt(dx*dx + dy*dy);
    if (speed > 1.5) shipAngle = Math.atan2(dy, dx);

    const sternX = mx - Math.cos(shipAngle) * 20;
    const sternY = my - Math.sin(shipAngle) * 20;
    const count = Math.min(Math.floor(speed / 3) + 1, 9);
    const COLORS = ['#00ffff','#8844ff','#ffffff','#4488ff','#00aaff'];
    for (let i = 0; i < count; i++) {
      const spread = (Math.random() - 0.5) * 9;
      const spd = 1.2 + Math.random() * speed * 0.28;
      WARP.push({
        x: sternX - Math.sin(shipAngle) * spread,
        y: sternY + Math.cos(shipAngle) * spread,
        vx: -Math.cos(shipAngle) * spd * (0.6 + Math.random() * 0.8),
        vy: -Math.sin(shipAngle) * spd * (0.6 + Math.random() * 0.8),
        life: 1.0, decay: 0.035 + Math.random() * 0.045,
        size: 1.5 + Math.random() * 2.8,
        color: COLORS[Math.floor(Math.random() * COLORS.length)],
      });
    }

    if (Math.random() < 0.12)
      RIPPLES.push({x: mx, y: my, r: 2, alpha: 0.3, maxR: 28, expand: 2.2, lw: 1});
  });

  document.addEventListener('click', e => {
    for (let i = 0; i < 5; i++)
      RIPPLES.push({x: e.clientX, y: e.clientY, r: 3 + i*7, alpha: 0.75 - i*0.1,
                    maxR: 55 + i*28, expand: 3 + i*0.5, lw: 2 - i*0.25});
    for (let i = 0; i < 20; i++) {
      const a = Math.random() * Math.PI * 2;
      WARP.push({x: e.clientX, y: e.clientY,
                 vx: Math.cos(a) * (2 + Math.random() * 5),
                 vy: Math.sin(a) * (2 + Math.random() * 5),
                 life: 1.0, decay: 0.03 + Math.random() * 0.04,
                 size: 2 + Math.random() * 3,
                 color: ['#00ffff','#ff44aa','#8844ff','#ffffff'][Math.floor(Math.random()*4)]});
    }
  });

  function drawShip(x, y, angle, bob) {
    cc.save();
    cc.translate(x, y);
    cc.rotate(angle + Math.sin(frame * 0.035) * 0.04);
    cc.translate(0, bob);

    const eg = cc.createRadialGradient(-20, 0, 0, -20, 0, 16);
    eg.addColorStop(0,   'rgba(0,200,255,0.95)');
    eg.addColorStop(0.3, 'rgba(80,40,255,0.6)');
    eg.addColorStop(1,   'rgba(0,0,80,0)');
    cc.beginPath(); cc.arc(-20, 0, 16, 0, Math.PI*2);
    cc.fillStyle = eg; cc.fill();

    cc.shadowColor = '#00aaff'; cc.shadowBlur = 12;
    cc.beginPath();
    cc.moveTo(22, 0);
    cc.quadraticCurveTo(16, -9, -12, -8);
    cc.lineTo(-20, 0);
    cc.lineTo(-12, 8);
    cc.quadraticCurveTo(16, 9, 22, 0);
    cc.fillStyle = '#1c0900'; cc.fill();
    cc.strokeStyle = '#8B4513'; cc.lineWidth = 1.5; cc.stroke();
    cc.shadowBlur = 0;

    cc.beginPath();
    cc.moveTo(18, -1);
    cc.quadraticCurveTo(2, -8, -12, -7);
    cc.strokeStyle = 'rgba(200,40,40,0.75)'; cc.lineWidth = 1; cc.stroke();

    cc.beginPath();
    cc.moveTo(-3, -8); cc.lineTo(10, -8); cc.lineTo(14, -21); cc.lineTo(-1, -19);
    cc.closePath();
    cc.fillStyle = 'rgba(238,218,148,0.9)'; cc.fill();
    cc.strokeStyle = 'rgba(100,80,30,0.55)'; cc.lineWidth = 0.5; cc.stroke();
    cc.font = '7px sans-serif'; cc.textAlign = 'center'; cc.textBaseline = 'middle';
    cc.fillStyle = 'rgba(0,0,0,0.85)'; cc.fillText('☠', 6, -14);

    cc.beginPath();
    cc.moveTo(-3, 8); cc.lineTo(10, 8); cc.lineTo(14, 21); cc.lineTo(-1, 19);
    cc.closePath();
    cc.fillStyle = 'rgba(238,218,148,0.9)'; cc.fill();
    cc.strokeStyle = 'rgba(100,80,30,0.55)'; cc.lineWidth = 0.5; cc.stroke();
    cc.fillStyle = 'rgba(0,0,0,0.85)'; cc.fillText('☠', 6, 14);

    cc.beginPath(); cc.arc(3, 0, 2.5, 0, Math.PI*2);
    cc.fillStyle = '#555'; cc.fill();
    cc.strokeStyle = '#999'; cc.lineWidth = 0.8; cc.stroke();

    cc.font = '9px sans-serif'; cc.textAlign = 'center'; cc.textBaseline = 'middle';
    cc.fillStyle = 'rgba(255,255,255,0.72)'; cc.fillText('☠', -8, 0);

    cc.fillStyle = '#2a2a2a';
    for (let i = -1; i <= 1; i++) {
      cc.beginPath(); cc.arc(i*7, -8, 1.3, 0, Math.PI*2); cc.fill();
      cc.beginPath(); cc.arc(i*7, 8,  1.3, 0, Math.PI*2); cc.fill();
    }

    cc.beginPath();
    cc.moveTo(-18, -3); cc.lineTo(-25, -2); cc.lineTo(-25, 2); cc.lineTo(-18, 3);
    cc.closePath();
    cc.fillStyle = '#1a1a1a'; cc.fill();
    cc.strokeStyle = '#00aaff'; cc.lineWidth = 0.8; cc.stroke();
    cc.beginPath();
    cc.moveTo(-18, -2); cc.lineTo(-23, 0); cc.lineTo(-18, 2); cc.closePath();
    cc.fillStyle = `rgba(0,${180+Math.floor(Math.sin(frame*0.15)*50)},255,0.95)`;

    cc.restore();
  }

  function drawFrame() {
    const inEditMode = document.body.classList.contains('edit-mode');
    cc_canvas.style.display = inEditMode ? 'none' : 'block';
    if (inEditMode) { requestAnimationFrame(drawFrame); return; }
    cc.clearRect(0, 0, cc_canvas.width, cc_canvas.height);
    frame++;

    let diff = shipAngle - smoothAngle;
    while (diff > Math.PI) diff -= Math.PI*2;
    while (diff < -Math.PI) diff += Math.PI*2;
    smoothAngle += diff * 0.18;

    const bob = Math.sin(frame * 0.038) * 1.8;

    for (let i = WARP.length - 1; i >= 0; i--) {
      const p = WARP[i];
      const len = Math.sqrt(p.vx*p.vx + p.vy*p.vy + 0.001);
      cc.beginPath();
      cc.moveTo(p.x, p.y);
      cc.lineTo(p.x - (p.vx/len) * len * 2.5, p.y - (p.vy/len) * len * 2.5);
      cc.strokeStyle = p.color; cc.globalAlpha = p.life * 0.55;
      cc.lineWidth = p.size * 0.55; cc.stroke();
      cc.beginPath(); cc.arc(p.x, p.y, p.size * p.life * 0.8, 0, Math.PI*2);
      cc.fillStyle = p.color; cc.globalAlpha = p.life * 0.85; cc.fill();
      cc.globalAlpha = 1;
      p.x += p.vx; p.y += p.vy;
      p.vx *= 0.92; p.vy *= 0.92;
      p.life -= p.decay;
      if (p.life <= 0) WARP.splice(i, 1);
    }
    cc.globalAlpha = 1;

    for (let i = RIPPLES.length - 1; i >= 0; i--) {
      const r = RIPPLES[i];
      cc.beginPath(); cc.arc(r.x, r.y, r.r, 0, Math.PI*2);
      cc.strokeStyle = `rgba(0,220,255,${r.alpha})`;
      cc.lineWidth = r.lw; cc.stroke();
      if (r.r > 18) {
        cc.beginPath(); cc.arc(r.x, r.y, r.r * 0.52, 0, Math.PI*2);
        cc.strokeStyle = `rgba(140,70,255,${r.alpha * 0.45})`;
        cc.lineWidth = r.lw * 0.55; cc.stroke();
      }
      r.r += r.expand; r.alpha *= 0.905;
      if (r.r > r.maxR || r.alpha < 0.01) RIPPLES.splice(i, 1);
    }

    drawShip(mx, my, smoothAngle, bob);
    requestAnimationFrame(drawFrame);
  }
  drawFrame();
})();
</script>
